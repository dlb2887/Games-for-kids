<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Butterfly Garden — Learn & Play 🦋</title>
<style>
  :root{
    --sky1:#b3e5fc; --sky2:#e1f5fe; --grass:#a5d6a7;
    --pink:#ff8fb1; --purple:#b388ff; --orange:#ffb74d; --yellow:#ffe066;
    --blue:#4fc3f7; --green:#81c784; --red:#ff7d7d; --ink:#41355c;
    --card:#fffdf7; --shadow:0 10px 0 rgba(0,0,0,.08), 0 18px 40px rgba(80,50,120,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    font-family:'Comic Sans MS','Baloo 2','Trebuchet MS',system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--sky1) 0%, var(--sky2) 45%, var(--grass) 100%);
    overflow:hidden; user-select:none; touch-action:manipulation;
  }
  /* floating clouds + sun for ambience */
  .sun{position:fixed; top:4vh; right:6vw; width:110px; height:110px; border-radius:50%;
    background:radial-gradient(circle at 50% 50%, #fff6c2, #ffe066 70%); box-shadow:0 0 60px #ffe06699; z-index:0;}
  .cloud{position:fixed; background:#fff; border-radius:50px; opacity:.85; z-index:0;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.06)); animation:drift linear infinite;}
  .cloud::before,.cloud::after{content:""; position:absolute; background:#fff; border-radius:50%;}
  @keyframes drift{from{transform:translateX(-30vw);}to{transform:translateX(120vw);}}

  .stage{position:relative; z-index:2; height:100%; display:flex; flex-direction:column;}
  .screen{flex:1; display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:18px; gap:14px; text-align:center; overflow-y:auto;}
  .screen.active{display:flex; animation:pop .4s ease both;}
  @keyframes pop{from{opacity:0; transform:scale(.94) translateY(10px);}to{opacity:1; transform:none;}}

  h1{font-size:clamp(28px,7vw,56px); margin:0; color:#fff;
     text-shadow:0 3px 0 #ff8fb1, 0 6px 0 #b388ff, 0 10px 18px rgba(0,0,0,.18); letter-spacing:1px;}
  .subtitle{font-size:clamp(16px,3.4vw,24px); color:#5d4a86; background:#ffffffcc;
     padding:6px 16px; border-radius:30px; box-shadow:var(--shadow);}

  /* Big friendly buttons */
  .bigbtn{
    border:none; cursor:pointer; color:#fff; font-family:inherit; font-weight:bold;
    font-size:clamp(20px,4.5vw,30px); padding:22px 30px; border-radius:28px;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:14px; min-width:260px;
    justify-content:center; transition:transform .12s ease, filter .12s ease;
  }
  .bigbtn:active{transform:translateY(4px) scale(.98); filter:brightness(1.05);}
  .bigbtn.pink{background:linear-gradient(180deg,#ffa3c2,#ff6f9c);}
  .bigbtn.purple{background:linear-gradient(180deg,#c4a3ff,#9b6bff);}
  .bigbtn.green{background:linear-gradient(180deg,#9be29e,#5cc463);}
  .bigbtn.blue{background:linear-gradient(180deg,#7fd6fb,#34b3ef);}
  .bigbtn .emoji{font-size:1.4em;}

  .menu{display:flex; flex-direction:column; gap:18px; align-items:center;}

  /* Top bar */
  .topbar{position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between;
    align-items:center; padding:12px 16px; z-index:5; pointer-events:none;}
  .topbar > *{pointer-events:auto;}
  .roundbtn{border:none; cursor:pointer; width:62px; height:62px; border-radius:50%;
    background:#fffdf7; box-shadow:var(--shadow); font-size:28px; display:grid; place-items:center;
    transition:transform .12s;}
  .roundbtn:active{transform:scale(.9);}
  .badge{background:#fffdf7; box-shadow:var(--shadow); border-radius:30px; padding:8px 18px;
    font-size:clamp(16px,3.4vw,22px); font-weight:bold; display:flex; align-items:center; gap:8px;}

  /* Question card */
  .qcard{background:var(--card); border-radius:34px; box-shadow:var(--shadow); padding:18px 20px;
    width:min(680px,94vw); display:flex; flex-direction:column; align-items:center; gap:12px;}
  .prompt{font-size:clamp(20px,4.4vw,30px); font-weight:bold; color:#5d4a86;}
  .stageRow{display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px; min-height:120px;}
  .opSign{font-size:clamp(34px,8vw,60px); font-weight:bold; color:var(--purple); margin:0 6px;}
  .group{display:flex; flex-wrap:wrap; justify-content:center; gap:2px; max-width:46vw;}

  .choices{display:flex; gap:14px; flex-wrap:wrap; justify-content:center;}
  .choice{border:none; cursor:pointer; width:clamp(84px,20vw,120px); height:clamp(84px,20vw,120px);
    border-radius:26px; font-size:clamp(34px,8vw,54px); font-weight:bold; color:#fff;
    box-shadow:var(--shadow); transition:transform .12s;}
  .choice:active{transform:translateY(4px) scale(.97);}
  .choice.wrong{animation:shake .4s;}
  .choice.right{animation:bounce .5s;}
  @keyframes shake{0%,100%{transform:none}20%{transform:translateX(-10px) rotate(-4deg)}40%{transform:translateX(10px) rotate(4deg)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
  @keyframes bounce{0%{transform:scale(1)}30%{transform:scale(1.25)}60%{transform:scale(.92)}100%{transform:scale(1)}}

  /* Spelling */
  .slots{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .slot{width:clamp(56px,14vw,84px); height:clamp(66px,16vw,96px); border-radius:18px;
    background:#fff; border:5px dashed #cdbdf0; display:grid; place-items:center;
    font-size:clamp(30px,7vw,52px); font-weight:bold; color:var(--purple);}
  .slot.filled{border-style:solid; border-color:#9be29e; background:#eafaea;}
  .picword{font-size:clamp(60px,16vw,120px); line-height:1;}
  .letterPad{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; max-width:96vw;}
  .lbtn{position:relative; border:none; cursor:pointer; width:clamp(78px,18vw,108px);
    height:clamp(78px,18vw,108px); background:transparent; transition:transform .12s;}
  .lbtn:active{transform:translateY(4px) scale(.96);}
  .lbtn.used{opacity:0; pointer-events:none; transform:scale(.4);}
  .lbtn .lett{position:absolute; inset:0; display:grid; place-items:center;
    font-size:clamp(30px,7vw,46px); font-weight:bold; color:#fff; text-shadow:0 2px 3px rgba(0,0,0,.25);}
  .lbtn.wrong{animation:shake .4s;}

  .bfly{display:inline-block; filter:drop-shadow(0 6px 6px rgba(80,40,120,.18));}
  .flutter{animation:flutter 2.4s ease-in-out infinite;}
  @keyframes flutter{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
  .wings{transform-origin:center; animation:flap .35s ease-in-out infinite alternate;}
  @keyframes flap{from{transform:scaleX(1)}to{transform:scaleX(.78)}}

  /* Hero photo on home */
  .hero{width:min(520px,90vw); border-radius:30px; box-shadow:var(--shadow); overflow:hidden;
    background:#fff; position:relative;}
  .hero img{display:block; width:100%; height:170px; object-fit:cover;}
  .hero .fallback{height:170px; display:grid; place-items:center; background:linear-gradient(180deg,#e1bee7,#b388ff);}

  /* Confetti / celebrating butterflies */
  #party{position:fixed; inset:0; pointer-events:none; z-index:50; overflow:hidden;}
  .confetti{position:absolute; will-change:transform; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

  .cheerText{position:fixed; inset:0; display:grid; place-items:center; z-index:60; pointer-events:none;}
  .cheerText span{font-size:clamp(44px,12vw,110px); font-weight:bold; color:#fff;
    text-shadow:0 4px 0 #ff8fb1,0 8px 0 #b388ff,0 14px 24px rgba(0,0,0,.25);
    animation:cheer 1.1s ease both;}
  @keyframes cheer{0%{transform:scale(.2) rotate(-12deg); opacity:0}30%{transform:scale(1.15) rotate(4deg); opacity:1}70%{transform:scale(1)}100%{transform:scale(1.4); opacity:0}}

  .hint{font-size:clamp(14px,3vw,18px); color:#6a5a93; background:#ffffffaa; padding:6px 14px; border-radius:20px;}
  .grassline{position:fixed; bottom:0; left:0; right:0; height:90px; z-index:1;
    background:radial-gradient(60px 40px at 50% 0,#7cc97f 60%,transparent 62%) repeat-x; background-size:120px 40px;
    border-top:0; opacity:.0;}

  /* Math: fly-in for new group + merge pulse for running total */
  .group.flyin{animation:flyin .6s ease both;}
  @keyframes flyin{from{opacity:0; transform:translateX(46px) scale(.55);}to{opacity:1; transform:none;}}
  .group.merged{animation:merge .55s ease;}
  @keyframes merge{0%{transform:scale(1.18);}55%{transform:scale(.94);}100%{transform:scale(1);}}
  /* Subtraction: the leaving group is faded and gently flies away (still countable) */
  .group.leaving{opacity:.5; animation:flyaway 1.2s ease both;}
  @keyframes flyaway{0%{opacity:.7; transform:none;}100%{opacity:.45; transform:translate(10px,-16px) rotate(8deg);}}
  .opSign.minus{color:#ff7d7d;}

  /* Dress Up & Play — built around REAL butterfly photos */
  #play{justify-content:flex-start; padding-top:80px; padding-bottom:26px; gap:12px;}
  .dressStage{position:relative; flex:0 0 auto; width:min(300px,72vw); height:min(300px,72vw);
    border-radius:34px; background:radial-gradient(circle at 50% 40%, #ffffffee, #ffffff66);
    box-shadow:var(--shadow); overflow:hidden; cursor:pointer;}
  /* Photo is absolutely positioned to fill the fixed-size stage. This gives iOS Safari/WebKit a
     definite containing block so object-fit:contain is honored (as a grid item it would otherwise
     lay out at intrinsic size and overflow/clip the butterfly). */
  .dressPhoto{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; display:block;
    transition:filter .25s ease; -webkit-user-drag:none; user-select:none;}
  .bigBfly{position:absolute; inset:0; display:grid; place-items:center;}
  .bigBfly svg{width:82%; height:82%;}
  .dressPhoto.fly, .bigBfly.fly{animation:happyfly 1.2s ease;}
  .dressPhoto.rainbow, .bigBfly.rainbow{animation:huecycle 4s linear infinite;}
  @keyframes huecycle{from{filter:grayscale(1) sepia(1) saturate(5) hue-rotate(0deg) brightness(1.05);}to{filter:grayscale(1) sepia(1) saturate(5) hue-rotate(360deg) brightness(1.05);}}
  @keyframes happyfly{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(-18%,-12%) rotate(-12deg)}50%{transform:translate(16%,-5%) rotate(10deg)}75%{transform:translate(-7%,7%) rotate(-6deg)}100%{transform:none}}
  /* Draggable accessories */
  .acc{position:absolute; display:none; line-height:1; pointer-events:auto; cursor:grab;
    touch-action:none; user-select:none; -webkit-user-drag:none;
    font-size:clamp(34px,9vw,52px); filter:drop-shadow(0 3px 4px rgba(0,0,0,.2)); z-index:3;}
  .acc.big{font-size:clamp(70px,20vw,120px);}
  .acc.on{display:block; animation:plop .3s ease both;}
  .acc.dragging{cursor:grabbing; animation:none; filter:drop-shadow(0 7px 8px rgba(0,0,0,.3)); z-index:6;}
  @keyframes plop{from{transform:scale(.2) translateY(-10px); opacity:0;}to{opacity:1;}}
  .dressHint{font-size:clamp(13px,3vw,17px); color:#5d4a86; background:#ffffffcc; padding:5px 14px; border-radius:18px;}

  .palette{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:94vw;}
  .swatch{width:clamp(40px,10vw,54px); height:clamp(40px,10vw,54px); border-radius:50%;
    border:4px solid #fff; box-shadow:var(--shadow); cursor:pointer; transition:transform .12s;}
  .swatch:active{transform:scale(.88);}
  .swatch.sel{outline:4px solid #41355c; outline-offset:2px;}

  .accBar{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:94vw;}
  .accChip{width:clamp(56px,13vw,72px); height:clamp(56px,13vw,72px); border-radius:20px; border:none;
    background:#fffdf7; box-shadow:var(--shadow); font-size:clamp(26px,6vw,36px); cursor:pointer; transition:transform .12s;}
  .accChip:active{transform:scale(.9);}
  .accChip.on{background:linear-gradient(180deg,#c4a3ff,#9b6bff);}
  .playBtns{display:flex; gap:14px; flex-wrap:wrap; justify-content:center;}
  .playBtns .bigbtn{min-width:0; padding:16px 22px; font-size:clamp(17px,3.6vw,24px);}
</style>
</head>
<body>
  <div class="sun"></div>
  <div id="party"></div>

  <div class="stage">
    <!-- Top bar (hidden on home) -->
    <div class="topbar" id="topbar" style="display:none;">
      <button class="roundbtn" id="homeBtn" title="Home">🏠</button>
      <div class="badge" id="scoreBadge">⭐ <span id="score">0</span></div>
      <button class="roundbtn" id="soundBtn" title="Sound effects on/off">🔊</button>
    </div>

    <!-- HOME -->
    <section class="screen active" id="home">
      <div class="topbar" style="position:absolute; justify-content:flex-end;">
        <button class="roundbtn" id="soundBtnHome" title="Sound effects on/off">🔊</button>
      </div>
      <h1>Butterfly Garden 🦋</h1>
      <div class="subtitle">Let's learn and play!</div>
      <div class="hero" id="hero">
        <img id="heroImg" alt="A pretty butterfly" />
        <div class="fallback" id="heroFallback" style="display:none;"></div>
      </div>
      <div class="menu">
        <button class="bigbtn green" data-go="math"><span class="emoji">🌼</span> Butterfly Math</button>
        <button class="bigbtn pink" data-go="spell"><span class="emoji">🐝</span> Spell Words</button>
        <button class="bigbtn purple" data-go="play"><span class="emoji">🎨</span> Dress Up &amp; Play</button>
      </div>
    </section>

    <!-- MATH -->
    <section class="screen" id="math">
      <div class="qcard">
        <div class="prompt" id="mathPrompt">How many butterflies?</div>
        <div class="stageRow" id="mathStage"></div>
        <div class="choices" id="mathChoices"></div>
      </div>
      <button class="bigbtn blue" id="mathSay"><span class="emoji">🔁</span> Say it again</button>
    </section>

    <!-- SPELLING -->
    <section class="screen" id="spell">
      <div class="qcard">
        <div class="prompt" id="spellPrompt">Spell the word!</div>
        <div class="picword" id="spellPic">🐱</div>
        <div class="slots" id="spellSlots"></div>
        <div class="letterPad" id="letterPad"></div>
      </div>
      <button class="bigbtn blue" id="spellSay"><span class="emoji">🔁</span> Say it again</button>
    </section>

    <!-- DRESS UP & PLAY (just for fun, no learning, no score) -->
    <section class="screen" id="play">
      <div class="prompt" id="playPrompt" style="color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.2);">Dress up your butterfly! 🎨</div>
      <div class="dressStage" id="dressStage">
        <img id="dressPhoto" class="dressPhoto" alt="A real butterfly" draggable="false" />
        <div class="bigBfly" id="bigBfly" style="display:none;"></div>
      </div>
      <div class="dressHint">Add things, then drag them onto your butterfly! ✨</div>
      <div class="palette" id="wingPalette"></div>
      <div class="accBar" id="accBar"></div>
      <div class="playBtns">
        <button class="bigbtn green" id="newBflyBtn"><span class="emoji">🔄</span> New butterfly!</button>
        <button class="bigbtn purple" id="surpriseBtn"><span class="emoji">🎲</span> Surprise!</button>
        <button class="bigbtn blue" id="flyBtn"><span class="emoji">🦋</span> Make it fly!</button>
      </div>
    </section>
  </div>

<script>
/* ============================================================
   Butterfly Garden — a tiny educational game for ages ~4.
   Self-contained. No build step. Works offline.
   Teaches: counting, simple addition, and spelling short words.
   ============================================================ */

/* ---------- Tiny helpers ---------- */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const rnd = n => Math.floor(Math.random()*n);
const pick = arr => arr[rnd(arr.length)];
const shuffle = arr => arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]);

/* ---------- Butterfly SVG (colorable) ---------- */
const WING_COLORS = [
  ['#ff8fb1','#ffd1e3'], ['#b388ff','#e3d4ff'], ['#ffb74d','#ffe6c2'],
  ['#4fc3f7','#cdeffd'], ['#81c784','#d4f0d6'], ['#ff7d7d','#ffd6d6'],
  ['#ffe066','#fff4bf'], ['#7e57c2','#d7c6f0']
];
function butterflySVG(size=64, colors){
  const [a,b] = colors || pick(WING_COLORS);
  const id = 'g'+Math.random().toString(36).slice(2,7);
  return `<svg class="bfly" width="${size}" height="${size}" viewBox="0 0 100 100" aria-hidden="true">
    <defs>
      <radialGradient id="${id}" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="${b}"/><stop offset="100%" stop-color="${a}"/>
      </radialGradient>
    </defs>
    <g class="wings">
      <path d="M50 50 C20 5, -8 30, 18 48 C-6 58, 22 92, 50 60 Z" fill="url(#${id})" stroke="${a}" stroke-width="2"/>
      <path d="M50 50 C80 5, 108 30, 82 48 C106 58, 78 92, 50 60 Z" fill="url(#${id})" stroke="${a}" stroke-width="2"/>
      <circle cx="26" cy="34" r="5" fill="#fff" opacity=".7"/>
      <circle cx="74" cy="34" r="5" fill="#fff" opacity=".7"/>
      <circle cx="30" cy="64" r="3.5" fill="#fff" opacity=".6"/>
      <circle cx="70" cy="64" r="3.5" fill="#fff" opacity=".6"/>
    </g>
    <ellipse cx="50" cy="52" rx="5" ry="18" fill="#5b4a86"/>
    <circle cx="50" cy="34" r="6" fill="#41355c"/>
    <circle cx="47.5" cy="33" r="1.6" fill="#fff"/><circle cx="52.5" cy="33" r="1.6" fill="#fff"/>
    <path d="M50 30 C44 20, 40 18, 38 14" stroke="#41355c" stroke-width="2" fill="none"/>
    <path d="M50 30 C56 20, 60 18, 62 14" stroke="#41355c" stroke-width="2" fill="none"/>
    <circle cx="38" cy="13" r="2.4" fill="#41355c"/><circle cx="62" cy="13" r="2.4" fill="#41355c"/>
  </svg>`;
}

/* ---------- Sound + Voice engine ---------- */
/* localStorage can throw on file:// in some browsers — guard it so the game always runs. */
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let soundOn = (store.get('bfly_sound') ?? 'on') === 'on';
let audioCtx = null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }

function tone(freq, start, dur, type='sine', vol=0.18){
  if(!soundOn || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime + start;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
const SFX = {
  pop(){ ensureAudio(); tone(520,0,0.12,'triangle',0.14); },
  flap(){ ensureAudio(); tone(300,0,0.08,'sine',0.08); tone(360,0.05,0.08,'sine',0.06); },
  correct(){ ensureAudio(); [523,659,784,1046].forEach((f,i)=>tone(f, i*0.09, 0.18,'sine',0.16)); },
  cheer(){ ensureAudio(); [392,523,659,784,1046,1318].forEach((f,i)=>tone(f, i*0.08, 0.25,'triangle',0.16)); },
  gentle(){ ensureAudio(); tone(330,0,0.18,'sine',0.12); tone(262,0.12,0.22,'sine',0.12); }
};

/* Voice via Web Speech API. Voice instructions stay on so a non-reader can play. */
let voices = [];
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function bestVoice(){
  if(!voices.length) loadVoices();
  const en = voices.filter(v=>/en[-_]/i.test(v.lang) || /^en/i.test(v.lang));
  return en.find(v=>/female|samantha|zira|google us|aria|jenny/i.test(v.name)) || en[0] || voices[0];
}
function say(text, {rate=0.92, pitch=1.18}={}){
  if(!soundOn) return;            // the sound toggle mutes voice as well as effects
  if(!window.speechSynthesis) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = bestVoice(); if(v) u.voice = v;
    u.rate=rate; u.pitch=pitch; u.volume=1;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- Sound toggle UI ---------- */
function refreshSoundIcons(){ const ic = soundOn?'🔊':'🔇'; $('#soundBtn').textContent=ic; $('#soundBtnHome').textContent=ic; }
function toggleSound(){
  soundOn = !soundOn; store.set('bfly_sound', soundOn?'on':'off');
  refreshSoundIcons();
  if(soundOn){ ensureAudio(); SFX.pop(); }
  else if(window.speechSynthesis){
    speechSynthesis.cancel();
    // Chrome occasionally fails to stop an in-flight utterance on the first cancel() call.
    setTimeout(()=>{ if(speechSynthesis.speaking) speechSynthesis.cancel(); }, 50);
  }
}
$('#soundBtn').onclick = toggleSound;
$('#soundBtnHome').onclick = toggleSound;
refreshSoundIcons();

/* ---------- Score ---------- */
let score = 0;
function addStar(n=1){ score+=n; $('#score').textContent=score; }

/* ---------- Screen navigation ---------- */
function show(id){
  $$('.screen').forEach(s=>s.classList.remove('active'));
  $('#'+id).classList.add('active');
  $('#topbar').style.display = (id==='home') ? 'none' : 'flex';
  $('#scoreBadge').style.display = (id==='play') ? 'none' : 'flex'; // no score in free play
  if(id==='math') startMath();
  if(id==='spell') nextSpell();
  if(id==='play') startPlay();
  if(id==='home') say('Welcome to the Butterfly Garden! Pick a game.');
}
$$('[data-go]').forEach(b=> b.onclick = ()=>{ ensureAudio(); SFX.pop(); show(b.dataset.go); });
$('#homeBtn').onclick = ()=>{ SFX.pop(); show('home'); };

/* ============================================================
   CELEBRATION
   ============================================================ */
function celebrate(word){
  SFX.cheer();
  // butterfly confetti
  const party = $('#party');
  for(let i=0;i<22;i++){
    const d = document.createElement('div');
    d.className='confetti';
    d.style.left = Math.random()*100+'vw';
    d.style.top = '-10vh';
    d.style.animationDuration = (1.6+Math.random()*1.4)+'s';
    d.innerHTML = butterflySVG(28+rnd(26));
    party.appendChild(d);
    setTimeout(()=>d.remove(), 3200);
  }
  const t = document.createElement('div');
  t.className='cheerText'; t.innerHTML='<span>'+pick(['Yay!','Great!','Wow!','Super!','Nice!','You did it!'])+'</span>';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1100);
  if(word) setTimeout(()=>say(word,{rate:0.85}), 350);
}

/* ============================================================
   MATH GAME — "building up" counting that grows into addition.
   Count one group, then new groups fly in and add to a running
   total, building up to CAP_MATH, then celebrate and start fresh.
   ============================================================ */
const CAP_MATH = 20;
const TOTAL_WINGS = ['#ff8fb1','#ffd1e3']; // running-total butterflies (pink)
const NEW_WINGS   = ['#4fc3f7','#cdeffd']; // freshly arriving group (blue)

function butterflyGroup(n){ // legacy helper (kept for any reuse)
  let h='';
  for(let i=0;i<n;i++){ h += `<span class="flutter" style="animation-delay:${(i*0.18).toFixed(2)}s">${butterflySVG(54+rnd(10))}</span>`; }
  return h;
}
function groupHTML(n, colors, cls){
  const size = n>10 ? 36 : (n>6 ? 46 : 56);
  let h='';
  for(let i=0;i<n;i++){ h += `<span class="flutter" style="animation-delay:${(i*0.12).toFixed(2)}s">${butterflySVG(size+rnd(6), colors)}</span>`; }
  return `<div class="group ${cls||''}">${h}</div>`;
}
function answerChoices(correct, max){
  const set = new Set([correct]);
  while(set.size<3){ let d = correct + (rnd(2)?1:-1)*(1+rnd(3)); if(d>=0 && d<=max) set.add(d); else if(set.size<3) set.add((correct+rnd(max))% (max+1)); }
  return shuffle([...set]);
}

let garden = { total:0, step:0, maxSteps:0 };
let mathSpeech = '';
function startMath(){ garden = { total:0, step:0, maxSteps:5 + rnd(4) }; mathStep(); } // 5..8 steps
function mathStep(){
  const stage = $('#mathStage'), choicesEl = $('#mathChoices'), prompt = $('#mathPrompt');
  choicesEl.innerHTML=''; stage.innerHTML='';

  let answer;
  if(garden.step === 0){
    // Step 1: just count the first group
    const add = 2 + rnd(4);               // 2..5
    answer = add;
    prompt.textContent = 'How many butterflies?';
    stage.innerHTML = groupHTML(add, NEW_WINGS, 'flyin');
    mathSpeech = 'How many butterflies are in the garden? Count them!';
  } else {
    // Later steps: either more fly in (add) or some fly away (subtract)
    const room = CAP_MATH - garden.total;
    let doSub;
    if(garden.total <= 2) doSub = false;            // too few to take away
    else if(room < 1) doSub = true;                 // garden full, must subtract
    else doSub = rnd(2) === 0;                       // otherwise random

    if(!doSub){
      const add = 1 + rnd(Math.min(4, room));       // 1..min(4,room), never passes the cap
      answer = garden.total + add;
      prompt.textContent = `${garden.total} + ${add} = ?`;
      stage.innerHTML = groupHTML(garden.total, TOTAL_WINGS, 'totalGroup')
                      + `<span class="opSign">+</span>`
                      + groupHTML(add, NEW_WINGS, 'flyin');
      mathSpeech = `${add} more butterflies flew in! How many altogether? ${garden.total} plus ${add}.`;
    } else {
      const sub = 1 + rnd(garden.total - 1);        // 1..(total-1), result always >= 1
      answer = garden.total - sub;
      // show the running total with the last `sub` butterflies marked as flying away
      const stay = garden.total - sub;
      prompt.textContent = `${garden.total} − ${sub} = ?`;
      stage.innerHTML = groupHTML(stay, TOTAL_WINGS, 'totalGroup')
                      + `<span class="opSign minus">−</span>`
                      + groupHTML(sub, NEW_WINGS, 'leaving');
      mathSpeech = `${sub} ${sub===1?'butterfly':'butterflies'} flew away! How many are left? ${garden.total} take away ${sub}.`;
    }
  }
  say(mathSpeech);

  const palette=[['#ffa3c2','#ff6f9c'],['#c4a3ff','#9b6bff'],['#7fd6fb','#34b3ef'],['#9be29e','#5cc463']];
  answerChoices(answer, CAP_MATH).forEach((val,i)=>{
    const btn=document.createElement('button');
    btn.className='choice'; btn.textContent=val;
    const c=palette[i%palette.length]; btn.style.background=`linear-gradient(180deg,${c[0]},${c[1]})`;
    btn.onclick=()=>{
      if(val===answer){
        btn.classList.add('right'); SFX.correct();
        garden.total = answer; garden.step++;
        addStar();
        choicesEl.innerHTML='';
        // butterflies settle into one running-total group
        stage.innerHTML = groupHTML(garden.total, TOTAL_WINGS, 'merged');
        say('Yes! Now there are '+garden.total+'.');
        if(garden.step >= garden.maxSteps || garden.total >= CAP_MATH){
          // sequence done — big celebration, then a fresh garden
          setTimeout(()=>{
            celebrate();
            addStar(2);
            say('Wow! Great butterfly math! Let us start a new garden.', {rate:0.9});
            setTimeout(startMath, 2700);
          }, 900);
        } else {
          setTimeout(mathStep, 1600);
        }
      } else {
        btn.classList.add('wrong'); SFX.gentle(); say('Oops, try again!');
        setTimeout(()=>btn.classList.remove('wrong'),420);
      }
    };
    choicesEl.appendChild(btn);
  });
}
$('#mathSay').onclick = ()=>{ SFX.pop(); if(mathSpeech) say(mathSpeech); };

/* ============================================================
   SPELLING GAME — short words with letter-carrying butterflies
   ============================================================ */
const WORDS = [
  {w:'cat', pic:'🐱'}, {w:'dog', pic:'🐶'}, {w:'sun', pic:'☀️'}, {w:'bee', pic:'🐝'},
  {w:'cow', pic:'🐄'}, {w:'pig', pic:'🐷'}, {w:'bug', pic:'🐛'}, {w:'hat', pic:'🎩'},
  {w:'fox', pic:'🦊'}, {w:'bus', pic:'🚌'}, {w:'owl', pic:'🦉'}, {w:'egg', pic:'🥚'}
];
let cur = null, pos = 0, lastWord = -1;
function nextSpell(){
  let idx; do{ idx = rnd(WORDS.length); } while(idx===lastWord && WORDS.length>1);
  lastWord = idx; cur = WORDS[idx]; pos = 0;
  const letters = cur.w.toUpperCase().split('');

  $('#spellPic').textContent = cur.pic;
  $('#spellPrompt').textContent = 'Spell the word!';

  // slots
  const slots = $('#spellSlots'); slots.innerHTML='';
  letters.forEach(()=>{ const s=document.createElement('div'); s.className='slot'; slots.appendChild(s); });

  // letter butterflies (shuffled)
  const pad = $('#letterPad'); pad.innerHTML='';
  shuffle(letters.map((ch,i)=>({ch,i}))).forEach(({ch})=>{
    const btn=document.createElement('button'); btn.className='lbtn'; btn.dataset.letter=ch;
    btn.innerHTML = butterflySVG(96) + `<span class="lett">${ch}</span>`;
    btn.onclick = ()=> tapLetter(btn, ch);
    pad.appendChild(btn);
  });

  say(`Can you spell ${cur.w}? ${cur.w.split('').join('. ')}.`, {rate:0.8});
}
function tapLetter(btn, ch){
  const need = cur.w.toUpperCase()[pos];
  if(ch===need){
    SFX.flap(); say(ch);
    const slot = $('#spellSlots').children[pos];
    slot.textContent = ch; slot.classList.add('filled');
    btn.classList.add('used'); pos++;
    if(pos===cur.w.length){
      addStar(2); celebrate(cur.w);
      setTimeout(nextSpell, 1900);
    }
  } else {
    btn.classList.add('wrong'); SFX.gentle();
    say('Try the '+need.toLowerCase()+' butterfly!');
    setTimeout(()=>btn.classList.remove('wrong'),420);
  }
}
$('#spellSay').onclick = ()=>{ SFX.pop(); if(cur) say(`Spell ${cur.w}. ${cur.w.split('').join('. ')}.`,{rate:0.8}); };

/* ============================================================
   DRESS UP & PLAY — free, just-for-fun sandbox built around
   REAL butterfly photos. No score, no goals: pick a real
   butterfly, tint its colors, add accessories, sparkle.
   ============================================================ */
const PLAY_PHOTOS = [
  'assets/photos/cutout1.png', // blue morpho (transparent)
  'assets/photos/cutout2.png', // atlas moth (transparent)
  'assets/photos/cutout3.png', // green swallowtail (transparent)
  'assets/photos/cutout4.png'  // yellow swallowtail (transparent)
];
/* "Colors" tint the real photo to an exact target color. grayscale+sepia normalizes any base
   photo to one consistent hue, then hue-rotate maps it to the chosen color (white background and
   dark edges are unaffected), so the result is correct no matter which butterfly is showing. */
const PLAY_COLORS = [
  {name:'pink',    dot:'#ff6f9c', f:'grayscale(1) sepia(1) saturate(6) hue-rotate(290deg) brightness(1.05)'},
  {name:'purple',  dot:'#9b6bff', f:'grayscale(1) sepia(1) saturate(6) hue-rotate(235deg) brightness(1.0)'},
  {name:'orange',  dot:'#ffb74d', f:'grayscale(1) sepia(1) saturate(5) hue-rotate(350deg) brightness(1.08)'},
  {name:'blue',    dot:'#34b3ef', f:'grayscale(1) sepia(1) saturate(6) hue-rotate(170deg) brightness(1.02)'},
  {name:'green',   dot:'#5cc463', f:'grayscale(1) sepia(1) saturate(5) hue-rotate(90deg) brightness(1.05)'},
  {name:'red',     dot:'#ff5d5d', f:'grayscale(1) sepia(1) saturate(7) hue-rotate(320deg) brightness(1.0)'},
  {name:'yellow',  dot:'#ffe066', f:'grayscale(1) sepia(1) saturate(5) hue-rotate(10deg) brightness(1.15)'},
  {name:'rainbow', dot:'conic',   f:'RAINBOW'}
];
const ACCESSORIES = [
  {slot:'hat',     emoji:'🎩', name:'a hat',        dx:38, dy:2},
  {slot:'crown',   emoji:'👑', name:'a crown',      dx:38, dy:1},
  {slot:'bow',     emoji:'🎀', name:'a bow',        dx:58, dy:10},
  {slot:'glasses', emoji:'🕶️', name:'sunglasses',   dx:36, dy:30},
  {slot:'flower',  emoji:'🌸', name:'a flower',     dx:8,  dy:38},
  {slot:'eyes',    emoji:'👀', name:'eyes',         dx:38, dy:30},
  {slot:'nose',    emoji:'👃', name:'a nose',       dx:45, dy:38},
  {slot:'mouth',   emoji:'👄', name:'a mouth',      dx:43, dy:46},
  {slot:'ears',    emoji:'👂', name:'ears',         dx:60, dy:24},
  {slot:'legs',    emoji:'🦵', name:'legs',         dx:46, dy:62},
  {slot:'dress',   emoji:'👗', name:'a dress',      dx:30, dy:42, big:true},
  {slot:'sari',    emoji:'🥻', name:'a fancy dress',dx:50, dy:44, big:true},
  {slot:'top',     emoji:'👚', name:'a shirt',      dx:12, dy:46, big:true}
];
const FALLBACK_WINGS = ['#ff8fb1','#ffd1e3'];
let photoIdx = 0, photoMode = true, currentFilter = '', activeAcc = new Set(), playBuilt = false;

function visibleBfly(){ return photoMode ? $('#dressPhoto') : $('#bigBfly'); }
function applyTint(){
  const rb = currentFilter === 'RAINBOW';
  [$('#dressPhoto'), $('#bigBfly')].forEach(el=>{
    el.classList.toggle('rainbow', rb);
    el.style.filter = rb ? '' : currentFilter;
  });
}
function renderBfly(){
  const ph=$('#dressPhoto'), bf=$('#bigBfly');
  if(photoMode){
    ph.style.display='block'; bf.style.display='none';
    const i = ((photoIdx % PLAY_PHOTOS.length) + PLAY_PHOTOS.length) % PLAY_PHOTOS.length;
    ph.src = PLAY_PHOTOS[i];
  } else {
    ph.style.display='none'; bf.style.display='grid';
    bf.innerHTML = butterflySVG(300, FALLBACK_WINGS); // graceful offline fallback
  }
  applyTint();
}
const accEls = {}; // slot -> DOM element currently on the stage
function makeDraggable(el){
  let dragging=false, ox=0, oy=0;
  const stage = $('#dressStage');
  el.addEventListener('pointerdown', e=>{
    e.preventDefault(); e.stopPropagation(); // don't trigger the garden sparkle / butterfly tap
    dragging=true; el.classList.add('dragging');
    try{ el.setPointerCapture(e.pointerId); }catch(_){}
    const r = el.getBoundingClientRect();
    ox = e.clientX - r.left; oy = e.clientY - r.top;
    SFX.flap();
  });
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const sr = stage.getBoundingClientRect();
    let x = e.clientX - sr.left - ox;
    let y = e.clientY - sr.top - oy;
    x = Math.max(0, Math.min(x, sr.width  - el.offsetWidth));
    y = Math.max(0, Math.min(y, sr.height - el.offsetHeight));
    el.style.left = x+'px'; el.style.top = y+'px';
  });
  const end = ()=>{ dragging=false; el.classList.remove('dragging'); };
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}
function makeAccEl(a){
  const el = document.createElement('div');
  el.className='acc on' + (a.big ? ' big' : ''); el.dataset.slot=a.slot; el.textContent=a.emoji;
  el.style.left = a.dx+'%'; el.style.top = a.dy+'%';
  makeDraggable(el);
  return el;
}
function addAcc(a){
  if(accEls[a.slot]) return;
  const el = makeAccEl(a);
  $('#dressStage').appendChild(el);
  accEls[a.slot]=el; activeAcc.add(a.slot);
}
function removeAcc(slot){
  if(accEls[slot]){ accEls[slot].remove(); delete accEls[slot]; }
  activeAcc.delete(slot);
}
function syncAccessories(){ // rebuild accessory elements at their default spots
  Object.keys(accEls).forEach(s=>{ accEls[s].remove(); delete accEls[s]; });
  ACCESSORIES.forEach(a=>{ if(activeAcc.has(a.slot)) addAcc(a); });
  updateAccChips();
}
function updateAccChips(){ $$('#accBar .accChip').forEach(b=> b.classList.toggle('on', activeAcc.has(b.dataset.slot))); }
function buildPlay(){
  // color swatches (tint the photo)
  const pal = $('#wingPalette'); pal.innerHTML='';
  PLAY_COLORS.forEach((col)=>{
    const s = document.createElement('div');
    s.className='swatch';
    s.style.background = (col.dot==='conic')
      ? 'conic-gradient(#ff6f9c,#ffe066,#5cc463,#34b3ef,#9b6bff,#ff6f9c)'
      : col.dot;
    s.title = col.name;
    s.onclick = ()=>{
      currentFilter = col.f; applyTint();
      $$('#wingPalette .swatch').forEach(x=>x.classList.remove('sel'));
      s.classList.add('sel');
      SFX.pop(); say(col.name);
    };
    pal.appendChild(s);
  });
  // accessory chips
  const bar = $('#accBar'); bar.innerHTML='';
  ACCESSORIES.forEach(a=>{
    const b = document.createElement('button');
    b.className='accChip'; b.textContent=a.emoji; b.title=a.name; b.dataset.slot=a.slot;
    b.onclick = ()=>{
      if(activeAcc.has(a.slot)){ removeAcc(a.slot); b.classList.remove('on'); SFX.pop(); }
      else { addAcc(a); b.classList.add('on'); SFX.flap(); say(a.name); }
    };
    bar.appendChild(b);
  });
  // if a photo can't load (e.g. offline), fall back to illustrated butterfly
  $('#dressPhoto').addEventListener('error', ()=>{ if(photoMode){ photoMode=false; renderBfly(); } });
  // tap anywhere in the garden to make butterflies flutter + sparkle
  $('#dressStage').addEventListener('pointerdown', sparkleAt);
  playBuilt = true;
}
function sparkleAt(e){
  SFX.flap();
  const stage = $('#dressStage'); const r = stage.getBoundingClientRect();
  const x = (e.clientX!=null? e.clientX - r.left : r.width/2);
  const y = (e.clientY!=null? e.clientY - r.top  : r.height/2);
  for(let i=0;i<3;i++){
    const d = document.createElement('div');
    d.style.position='absolute'; d.style.left=x+'px'; d.style.top=y+'px';
    d.style.pointerEvents='none'; d.style.zIndex=4;
    d.style.transition='transform 1.1s ease, opacity 1.1s ease';
    d.innerHTML = (Math.random()<0.5) ? butterflySVG(24+rnd(20)) : '<span style="font-size:26px">✨</span>';
    stage.appendChild(d);
    requestAnimationFrame(()=>{
      d.style.transform = `translate(${(rnd(120)-60)}px, ${-(40+rnd(120))}px) rotate(${rnd(360)}deg)`;
      d.style.opacity = '0';
    });
    setTimeout(()=>d.remove(), 1200);
  }
}
function startPlay(){
  if(!playBuilt) buildPlay();
  renderBfly(); syncAccessories();
  say('Let us dress up a real butterfly! Add things, then drag them onto your butterfly.');
}
$('#newBflyBtn').onclick = ()=>{
  photoMode = true;            // try photos again in case it had fallen back
  photoIdx++; renderBfly();
  SFX.flap(); say('A new butterfly!');
};
$('#surpriseBtn').onclick = ()=>{
  photoMode = true; photoIdx = rnd(PLAY_PHOTOS.length);
  currentFilter = pick(PLAY_COLORS).f;
  activeAcc = new Set(shuffle(ACCESSORIES.map(a=>a.slot)).slice(0, 2+rnd(3)));
  $$('#wingPalette .swatch').forEach(x=>x.classList.remove('sel'));
  renderBfly(); syncAccessories();
  SFX.cheer(); say(pick(['Ta-da!','So pretty!','Wow, look!','Surprise!']));
};
$('#flyBtn').onclick = ()=>{
  const el = visibleBfly(); el.classList.remove('fly'); void el.offsetWidth; el.classList.add('fly');
  SFX.flap(); say('Wheee!');
};

/* ============================================================
   HERO PHOTO (real butterfly) with graceful fallback to SVG
   ============================================================ */
(function setupHero(){
  const img = $('#heroImg'), fb = $('#heroFallback');
  // Real butterfly photos (rotates one in at random); falls back to illustrations if missing.
  const photos = ['assets/photos/butterfly1.jpg','assets/photos/butterfly2.jpg'];
  const candidates = shuffle(photos.slice());
  let i = 0;
  function tryNext(){
    if(i>=candidates.length){ // all failed -> illustrated fallback
      img.style.display='none'; fb.style.display='grid';
      fb.innerHTML = `<span class="flutter">${butterflySVG(120,['#ff8fb1','#ffd1e3'])}</span>
                      <span class="flutter" style="animation-delay:.4s">${butterflySVG(90,['#4fc3f7','#cdeffd'])}</span>`;
      return;
    }
    img.src = candidates[i++];
  }
  img.onerror = tryNext;
  tryNext();
})();

/* greet on first load */
window.addEventListener('load', ()=> setTimeout(()=>say('Welcome to the Butterfly Garden! Pick a game.'), 600));
/* unlock audio on first touch anywhere */
document.addEventListener('pointerdown', ensureAudio, {once:true});
