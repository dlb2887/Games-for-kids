        const { useState, useEffect, useRef } = React;

        // IndexedDB Helper Functions
        const DB_NAME = 'DisneyLearningGames';
        const DB_VERSION = 1;
        const STORE_NAME = 'gameProgress';

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        };

        // saveProgress and saveSessionData both do read-existing -> merge -> write
        // for the same record. Run them through a shared queue so two calls firing
        // close together (e.g. a score update and a session save on the same
        // answer) can't race and clobber each other's fields.
        let writeQueue = Promise.resolve();
        const enqueueWrite = (fn) => {
            const run = writeQueue.then(fn, fn);
            writeQueue = run.catch(() => {});
            return run;
        };

        // Reads a key from a store that's already part of an open transaction.
        // IMPORTANT: don't use loadProgress() (or any helper that opens its own
        // connection) for this — awaiting a fresh indexedDB.open() crosses a task
        // boundary, and an IndexedDB transaction auto-commits once it's gone idle
        // waiting on unrelated async work. Reading through the same transaction's
        // store keeps it alive so the follow-up put() doesn't throw
        // TransactionInactiveError.
        const getFromStore = (store, key) => new Promise((resolve, reject) => {
            const request = store.get(key);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });

        const saveProgress = (gameType, data) => enqueueWrite(async () => {
            try {
                const db = await initDB();
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);

                // Merge with existing record so this doesn't clobber fields
                // written by other savers (e.g. saveSessionData's `sessions`)
                const existing = await getFromStore(store, gameType);
                const progressData = {
                    id: gameType,
                    ...(existing || {}),
                    ...data,
                    lastUpdated: new Date().toISOString()
                };

                store.put(progressData);
                return new Promise((resolve, reject) => {
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });
            } catch (error) {
                console.error('Error saving progress:', error);
            }
        });

        const loadProgress = async (gameType) => {
            try {
                const db = await initDB();
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(gameType);
                
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            } catch (error) {
                console.error('Error loading progress:', error);
                return null;
            }
        };

        const clearProgress = (gameType) => enqueueWrite(async () => {
            try {
                const db = await initDB();
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.delete(gameType);

                return new Promise((resolve, reject) => {
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });
            } catch (error) {
                console.error('Error clearing progress:', error);
            }
        });

        // Session tracking for performance KPIs
        const saveSessionData = (gameType, sessionData) => enqueueWrite(async () => {
            try {
                const db = await initDB();
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);

                // Load existing data
                const existing = await getFromStore(store, gameType);
                const sessions = existing?.sessions || [];

                // Add new session (keep last 50 sessions for trends)
                sessions.push({
                    ...sessionData,
                    timestamp: new Date().toISOString()
                });
                if (sessions.length > 50) {
                    sessions.shift(); // Remove oldest
                }

                // Update progress with session history
                const progressData = {
                    id: gameType,
                    ...(existing || {}),
                    sessions,
                    lastUpdated: new Date().toISOString()
                };

                store.put(progressData);
                return new Promise((resolve, reject) => {
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });
            } catch (error) {
                console.error('Error saving session data:', error);
            }
        });

        // Text-to-speech voice selection. Browsers expose whatever voices the OS/
        // browser provides; the default one Web Speech API picks is often a dated,
        // robotic-sounding voice even when nicer ones (Edge's "Natural"/neural
        // voices, Chrome's "Google US English", macOS's "Samantha", etc.) are
        // available. This picks the best-quality voice for a requested gender
        // (princes speak male, princesses speak female), and varies which
        // specific voice gets used by character name so not every prince/
        // princess sounds identical when more than one good option exists.
        const VOICE_GENDER = {
            'Microsoft David - English (United States)': 'male',
            'Microsoft Mark - English (United States)': 'male',
            'Microsoft Zira - English (United States)': 'female',
            'Microsoft Guy Online (Natural) - English (United States)': 'male',
            'Microsoft Andrew Online (Natural) - English (United States)': 'male',
            'Microsoft Christopher Online (Natural) - English (United States)': 'male',
            'Microsoft Eric Online (Natural) - English (United States)': 'male',
            'Microsoft Roger Online (Natural) - English (United States)': 'male',
            'Microsoft Brian Online (Natural) - English (United States)': 'male',
            'Microsoft Davis Online (Natural) - English (United States)': 'male',
            'Microsoft Ava Online (Natural) - English (United States)': 'female',
            'Microsoft Emma Online (Natural) - English (United States)': 'female',
            'Microsoft Jenny Online (Natural) - English (United States)': 'female',
            'Microsoft Michelle Online (Natural) - English (United States)': 'female',
            'Microsoft Aria Online (Natural) - English (United States)': 'female',
            'Microsoft Sara Online (Natural) - English (United States)': 'female',
            'Google US English': 'female',
            'Google UK English Male': 'male',
            'Google UK English Female': 'female',
            'Samantha': 'female', 'Victoria': 'female', 'Karen': 'female', 'Moira': 'female', 'Tessa': 'female',
            'Alex': 'male', 'Fred': 'male', 'Daniel': 'male', 'Oliver': 'male'
        };

        const classifyVoiceGender = (voice) => {
            if (VOICE_GENDER[voice.name]) return VOICE_GENDER[voice.name];
            if (/female/i.test(voice.name)) return 'female';
            if (/\bmale\b/i.test(voice.name)) return 'male';
            return 'unknown';
        };

        const voiceQualityRank = (voice) => {
            if (/natural|online|neural/i.test(voice.name)) return 3;
            if (voice.name === 'Google US English' || voice.name === 'Samantha') return 2;
            if (voice.localService) return 1;
            return 0;
        };

        // Deterministic per-character pick so e.g. "Prince Eric" always sounds
        // the same, while a different prince can land on a different voice.
        const hashString = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) | 0;
            return Math.abs(hash);
        };

        // gender: 'male' | 'female' | null (no preference). seed: character
        // name used to vary which voice is picked among equally good options.
        const getBestVoice = (gender, seed) => {
            if (!('speechSynthesis' in window)) return null;
            const voices = speechSynthesis.getVoices();
            if (!voices.length) return null;

            const englishVoices = voices.filter(v => v.lang.startsWith('en'));
            const pool = englishVoices.length ? englishVoices : voices;

            let candidates = pool;
            if (gender) {
                const matching = pool.filter(v => classifyVoiceGender(v) === gender);
                if (matching.length) candidates = matching;
            }

            const bestRank = Math.max(...candidates.map(voiceQualityRank));
            const topTier = candidates.filter(v => voiceQualityRank(v) === bestRank);

            if (topTier.length === 1 || !seed) return topTier[0];
            return topTier[hashString(seed) % topTier.length];
        };

        // Global mute state, shared across every game's speak() function.
        // A plain module-level variable (not React state) so speak() always reads the live value
        // without every component needing to be re-rendered on toggle.
        let isMuted = (() => {
            try { return localStorage.getItem('pla_muted') === 'true'; } catch (e) { return false; }
        })();
        const muteListeners = new Set();
        const setGlobalMuted = (value) => {
            isMuted = value;
            try { localStorage.setItem('pla_muted', value ? 'true' : 'false'); } catch (e) {}
            if (value && 'speechSynthesis' in window) {
                speechSynthesis.cancel();
                // Chrome occasionally fails to stop an in-flight utterance on the first cancel() call.
                setTimeout(() => { if (speechSynthesis.speaking) speechSynthesis.cancel(); }, 50);
            }
            muteListeners.forEach(fn => fn(value));
        };
        const useMuted = () => {
            const [muted, setMuted] = useState(isMuted);
            useEffect(() => {
                muteListeners.add(setMuted);
                return () => muteListeners.delete(setMuted);
            }, []);
            return muted;
        };

        const MuteButton = ({ className = '' }) => {

            return (

                                    >

                                                <h3 className="text-2xl font-bold text-white mb-1">{module.name}</h3>

                    </div>

                    <div className="text-center">
                        <div className="bg-white bg-opacity-20 rounded-2xl p-6 inline-block">

                                🎯 Pick a game above to begin your learning adventure!
                            </p>

                </div>

        };

        const DisneyLearningGames = () => {
            const [currentGame, setCurrentGame] = useState('landing'); // Start with landing page
            const [unlockedBadges, setUnlockedBadges] = useState([]);
            const [newBadge, setNewBadge] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false);

            useEffect(() => {

                    const badges = await loadBadges();
                    setUnlockedBadges(badges);
                };
                loadInitialBadges();
            }, []);

            // Game modules
            const gameModules = [
                { id: 'numbers', name: 'Numbers', icon: Calculator, color: 'bg-blue-400', activeColor: 'bg-blue-600' },
                { id: 'letters', name: 'Letters', icon: BookOpen, color: 'bg-pink-400', activeColor: 'bg-pink-600' },
                { id: 'phonics', name: 'Phonics Sounds', icon: Star, color: 'bg-teal-400', activeColor: 'bg-teal-600' },
                { id: 'tracing', name: 'Letter Tracing', icon: Pencil, color: 'bg-purple-400', activeColor: 'bg-purple-600' },
                { id: 'memory', name: 'Memory Game', icon: Brain, color: 'bg-green-400', activeColor: 'bg-green-600' },
                { id: 'coding', name: 'Code Quest', icon: Star, color: 'bg-indigo-400', activeColor: 'bg-indigo-600' },
                { id: 'dressup', name: 'Dress-Up', icon: Crown, color: 'bg-rose-400', activeColor: 'bg-rose-600' }
            ];

            // Utility buttons (Progress & Badges)
            const utilityButtons = [

            const handleNavClick = (gameId) => {
                setCurrentGame(gameId);
                setSidebarOpen(false);

            // Show landing page if on landing, otherwise show game with sidebar
            if (currentGame === 'landing') {

                    <>
                        <LandingPage onSelectGame={setCurrentGame} unlockedBadges={unlockedBadges} />
                        {newBadge && <BadgeNotification badge={newBadge} onClose={() => setNewBadge(null)} />}
                    </>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-b from-purple-400 via-pink-400 to-yellow-400 flex">
                    {/* Sidebar Navigation */}
                    <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-gradient-to-b from-purple-600 to-pink-600 shadow-2xl transform transition-transform duration-300 ${
                        sidebarOpen ? 'translate-x-0' : '-translate-x-full'
                    }`}>
                        <div className="p-4">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold text-white">Menu</h2>
                                <button
                                    onClick={() => setSidebarOpen(false)}
                                    className="text-white hover:bg-white hover:bg-opacity-20 p-2 rounded-lg transition-colors"
                                >
                                    <X className="w-6 h-6" />
                                </button>
                            </div>

                            <nav className="space-y-2">
                                {/* Home Button */}
                                <button
                                    onClick={() => handleNavClick('landing')}
                                    className="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-white shadow-lg transition-all bg-gradient-to-r from-purple-500 to-pink-500 hover:scale-105"
                                >
                                    <Star className="w-5 h-5" />
                                    <span className="text-left">🏠 Home</span>
                                </button>

                                {/* Spacing after Home button */}
                                <div className="h-4"></div>

                                {/* Game Module Buttons */}
                                {gameModules.map((item) => {
                                    const IconComponent = item.icon;
                                    return (
                                        <button
                                            key={item.id}
                                            onClick={() => handleNavClick(item.id)}
                                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-white shadow-lg transition-all ${
                                                currentGame === item.id
                                                    ? `${item.activeColor} scale-105`
                                                    : `${item.color} hover:scale-105`
                                            }`}
                                        >
                                            <IconComponent className="w-5 h-5" />
                                            <span className="text-left">{item.name}</span>
                                        </button>
                                    );
                                })}

                                {/* Spacing before utility buttons */}
                                <div className="h-8"></div>

                                {/* Utility Buttons (Progress & Badges) - Different Style */}
                                {utilityButtons.map((item) => {
                                    const IconComponent = item.icon;
                                    return (
                                        <button
                                            key={item.id}
                                            onClick={() => handleNavClick(item.id)}
                                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-white shadow-lg transition-all border-2 ${
                                                currentGame === item.id
                                                    ? 'border-white bg-white bg-opacity-30 scale-105'
                                                    : 'border-white border-opacity-40 bg-white bg-opacity-10 hover:bg-opacity-20 hover:scale-105'
                                            }`}
                                        >
                                            <IconComponent className="w-5 h-5" />
                                            <span className="text-left">{item.name}</span>
                                        </button>
                                    );
                                })}
                            </nav>
                        </div>
                    </div>

                    {/* Overlay for mobile */}
                    {sidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black bg-opacity-50 z-40"
                            onClick={() => setSidebarOpen(false)}
                        />
                    )}

                    {/* Main Content */}
                    <div className="flex-1 p-4">
                        {/* Header with Menu Button */}
                        <div className="mb-6">
                            <div className="flex items-center gap-4 mb-4">
                                <button
                                    onClick={() => setSidebarOpen(true)}
                                    className="bg-white bg-opacity-20 hover:bg-opacity-30 text-white p-3 rounded-xl shadow-lg transition-all"
                                >
                                    <Menu className="w-6 h-6" />
                                </button>
                                <h1 className="text-4xl font-bold text-white drop-shadow-lg flex-1">Disney Learning Adventures</h1>
                                <MuteButton />
                            </div>
                        </div>

                        {/* Game Content */}
                        {currentGame === 'numbers' && <NumbersGame setUnlockedBadges={setUnlockedBadges} setNewBadge={setNewBadge} />}
                        {currentGame === 'letters' && <LettersGame setUnlockedBadges={setUnlockedBadges} setNewBadge={setNewBadge} />}
                        {currentGame === 'phonics' && <PhonicsGame setUnlockedBadges={setUnlockedBadges} setNewBadge={setNewBadge} />}
                        {currentGame === 'tracing' && <TracingGame setUnlockedBadges={setUnlockedBadges} setNewBadge={setNewBadge} />}
                        {currentGame === 'memory' && <MemoryGame setUnlockedBadges={setUnlockedBadges} setNewBadge={setNewBadge} />}
                        {currentGame === 'coding' && <CodingGame setUnlockedBadges={setUnlockedBadges} setNewBadge={setNewBadge} />}
                        {currentGame === 'dressup' && <DressUpGame setUnlockedBadges={setUnlockedBadges} setNewBadge={setNewBadge} />}
                        {currentGame === 'badges' && <BadgesView unlockedBadges={unlockedBadges} />}
                        {currentGame === 'dashboard' && <ParentDashboard />}

                        {newBadge && <BadgeNotification badge={newBadge} onClose={() => setNewBadge(null)} />}
                    </div>
                </div>
            );
        };

        const NumbersGame = ({ setUnlockedBadges, setNewBadge }) => {
            const [level, setLevel] = useState(1);
            const [currentNumber, setCurrentNumber] = useState(1);
            const [score, setScore] = useState(0);
            const [gameState, setGameState] = useState('playing');
            const [startTime, setStartTime] = useState(Date.now());
            const [averageResponseTime, setAverageResponseTime] = useState(5000);
            const [responseCount, setResponseCount] = useState(0);
            const [showCelebration, setShowCelebration] = useState(false);
            const [invalidKeyMessage, setInvalidKeyMessage] = useState('');
            const [highScore, setHighScore] = useState(0);
            const [isLoading, setIsLoading] = useState(true);
            const [fastAnswerCount, setFastAnswerCount] = useState(0);

            // Load saved progress on mount
            useEffect(() => {
                const loadSavedProgress = async () => {
                    const saved = await loadProgress('numbers');
                    if (saved) {
                        setLevel(saved.level || 1);
                        setScore(saved.score || 0);
                        setHighScore(saved.highScore || 0);
                    }
                    setIsLoading(false);
                };
                loadSavedProgress();
            }, []);

            // Save progress whenever score or level changes
            useEffect(() => {
                if (!isLoading) {
                    const newHighScore = Math.max(score, highScore);
                    setHighScore(newHighScore);
                    saveProgress('numbers', {
                        level,
                        score,
                        highScore: newHighScore
                    });
                }
            }, [score, level, isLoading]);

            const princes = [
                { 
                    name: 'Prince Eric', 
                    color: 'bg-blue-500', 
                    object: '🔱',
                    objectName: 'tridents',
                    image: '🤴🏻',
                    encouragements: [
                        "Great job!",
                        "Amazing!",
                        "Fantastic!",
                        "Well done!"
                    ]
                },
                { 
                    name: 'Prince Adam', 
                    color: 'bg-yellow-500', 
                    object: '🌹',
                    objectName: 'roses',
                    image: '👨🏻',
                    encouragements: [
                        "Wonderful!",
                        "Excellent!",
                        "Perfect!",
                        "Brilliant!"
                    ]
                },
                { 
                    name: 'Prince Charming', 
                    color: 'bg-purple-500', 
                    object: '👠',
                    objectName: 'glass slippers',
                    image: '🤴🏼',
                    encouragements: [
                        "Fantastic!",
                        "Marvelous!",
                        "Splendid!",
                        "Outstanding!"
                    ]
                },
                { 
                    name: 'Prince Naveen', 
                    color: 'bg-green-500', 
                    object: '🐸',
                    objectName: 'frogs',
                    image: '🤴🏽',
                    encouragements: [
                        "Amazing!",
                        "Incredible!",
                        "Terrific!",
                        "Superb!"
                    ]
                }
            ];

            const currentPrince = princes[(level - 1) % princes.length];
            const isCountingMode = level >= 3;

            const generateOptions = () => {
                const correctAnswer = currentNumber;
                const options = [correctAnswer];
                
                const maxRange = Math.min(level + 2, 10);
                while (options.length < Math.min(4, maxRange)) {
                    const wrongOption = Math.floor(Math.random() * maxRange) + 1;
                    if (!options.includes(wrongOption)) {
                        options.push(wrongOption);
                    }
                }
                
                return options.sort(() => Math.random() - 0.5);
            };

            const [options, setOptions] = useState(generateOptions());

            useEffect(() => {
                const handleKeyPress = (event) => {
                    if (gameState !== 'playing') return;
                    
                    const key = parseInt(event.key);
                    
                    if (!isNaN(key) && key >= 1 && key <= 10) {
                        if (options.includes(key)) {
                            handleAnswer(key);
                        } else {
                            // Show feedback for invalid key
                            setInvalidKeyMessage(`${key} is not one of the options. Try ${options.join(', ')}`);
                            speak(`${key} is not an option. Look for ${currentNumber}`, 0.9);
                            setTimeout(() => setInvalidKeyMessage(''), 3000);
                        }
                    }
                };

                window.addEventListener('keypress', handleKeyPress);
                return () => window.removeEventListener('keypress', handleKeyPress);
            }, [gameState, options, currentNumber]);

            const speak = (text, rate = 1) => {
                if (isMuted) return;
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = rate;
                    utterance.pitch = 1.2;
                    utterance.volume = 0.8;
                    utterance.voice = getBestVoice('male', currentPrince?.name);
                    speechSynthesis.speak(utterance);
                }
            };

            const generateNewQuestion = () => {
                const maxNumber = Math.min(level + 1, 10);
                let newNumber;
                
                do {
                    newNumber = Math.floor(Math.random() * maxNumber) + 1;
                } while (newNumber === currentNumber && maxNumber > 1);
                
                setCurrentNumber(newNumber);
                setStartTime(Date.now());
                setInvalidKeyMessage('');
                
                const correctAnswer = newNumber;
                const newOptions = [correctAnswer];
                
                const optionRange = Math.min(level + 3, 10);
                while (newOptions.length < Math.min(4, optionRange)) {
                    const wrongOption = Math.floor(Math.random() * optionRange) + 1;
                    if (!newOptions.includes(wrongOption)) {
                        newOptions.push(wrongOption);
                    }
                }
                
                setOptions(newOptions.sort(() => Math.random() - 0.5));
                setGameState('playing');
                
                const questionPrompts = isCountingMode ? [
                    `Count my ${currentPrince.objectName} and find that number!`,
                    `How many ${currentPrince.objectName} do you see?`,
                    `Count the ${currentPrince.objectName} and pick the right number!`,
                    `Count the ${currentPrince.objectName} and press that number!`
                ] : [
                    `Find the number ${newNumber}!`,
                    `Can you spot ${newNumber}?`,
                    `Where is ${newNumber} hiding?`,
                    `Touch the number ${newNumber}!`,
                    `Press the number ${newNumber} on your keyboard!`
                ];
                
                const randomPrompt = questionPrompts[Math.floor(Math.random() * questionPrompts.length)];
                
                setTimeout(() => {
                    speak(randomPrompt, 0.9);
                }, 500);
            };

            const handleAnswer = async (selectedNumber) => {
                if (gameState !== 'playing') return;

                const responseTime = Date.now() - startTime;
                const newResponseCount = responseCount + 1;
                const newAverageResponseTime = ((averageResponseTime * responseCount) + responseTime) / newResponseCount;

                setResponseCount(newResponseCount);
                setAverageResponseTime(newAverageResponseTime);
                setInvalidKeyMessage('');

                if (selectedNumber === currentNumber) {
                    setGameState('correct');
                    const newScore = score + 1;
                    setScore(newScore);
                    setShowCelebration(true);

                    // Save session data with KPIs
                    await saveSessionData('numbers', {
                        responseTime,
                        level,
                        correct: true,
                        number: currentNumber
                    });

                    // Check for fast answer
                    const newFastCount = responseTime < 2000 ? fastAnswerCount + 1 : 0;
                    setFastAnswerCount(newFastCount);

                    // Badge checking
                    const badges = await loadBadges();
                    let badgeToShow = null;

                    if (newScore === 1) badgeToShow = await checkAndUnlockBadge('numbers_score_1', badges);
                    else if (newScore === 10) badgeToShow = await checkAndUnlockBadge('numbers_score_10', badges);
                    else if (newScore === 25) badgeToShow = await checkAndUnlockBadge('numbers_score_25', badges);
                    else if (newFastCount === 5) badgeToShow = await checkAndUnlockBadge('speed_5', badges);

                    if (badgeToShow) {
                        setNewBadge(badgeToShow);
                        const updatedBadges = await loadBadges();
                        setUnlockedBadges(updatedBadges);
                    }

                    const randomEncouragement = currentPrince.encouragements[Math.floor(Math.random() * currentPrince.encouragements.length)];
                    speak(randomEncouragement, 1.1);

                    if (score > 0 && (score + 1) % 3 === 0) {
                        if (newAverageResponseTime < 3000 && level < 6) {
                            const newLevel = level + 1;
                            setLevel(newLevel);
                            const nextPrince = princes[level % princes.length];
                            speak(`Level up! Welcome ${nextPrince.name}!`, 1.2);

                            // Check level badges
                            if (newLevel === 3) badgeToShow = await checkAndUnlockBadge('level_3', badges);
                            else if (newLevel === 5) badgeToShow = await checkAndUnlockBadge('level_5', badges);

                            if (badgeToShow) {
                                setNewBadge(badgeToShow);
                                const updatedBadges = await loadBadges();
                                setUnlockedBadges(updatedBadges);
                            }
                        }
                    }

                    setTimeout(() => {
                        setShowCelebration(false);
                        generateNewQuestion();
                    }, 2500);

                } else {
                    setGameState('wrong');
                    setFastAnswerCount(0);

                    const tryAgainMessages = [
                        `Try again! Look for ${currentNumber}`,
                        `Oops! Can you find ${currentNumber}?`,
                        `Not quite! Where is ${currentNumber}?`
                    ];

                    const randomTryAgain = tryAgainMessages[Math.floor(Math.random() * tryAgainMessages.length)];
                    speak(randomTryAgain, 0.8);

                    setTimeout(() => {
                        setGameState('playing');
                    }, 2000);
                }
            };

            const renderThemedObjects = () => {
                const items = [];
                for (let i = 0; i < currentNumber; i++) {
                    items.push(
                        <div key={i} className="text-6xl animate-bounce inline-block mx-2 my-1" 
                             style={{ animationDelay: `${i * 0.15}s` }}>
                            {currentPrince.object}
                        </div>
                    );
                }
                return items;
            };

            useEffect(() => {
                setTimeout(() => {
                    speak(`Hi! I'm ${currentPrince.name}. Let's learn numbers together!`, 1);
                }, 1000);
            }, []);

            return (
                <div className="bg-gradient-to-b from-blue-300 via-purple-300 to-pink-300 rounded-3xl p-6">
                    <div className="text-center mb-6">
                        <div className="flex justify-center items-center gap-4 mb-4">
                            <Crown className="w-8 h-8 text-yellow-500" />
                            <h2 className="text-3xl font-bold text-white drop-shadow-lg">Prince Numbers Adventure</h2>
                            <Crown className="w-8 h-8 text-yellow-500" />
                        </div>
                        
                        <div className="flex justify-center gap-6 text-white font-semibold">
                            <div className="bg-blue-500 px-4 py-2 rounded-lg shadow-lg">
                                Level: {level}
                            </div>
                            <div className="bg-green-500 px-4 py-2 rounded-lg shadow-lg">
                                Score: {score}
                            </div>
                            {highScore > 0 && (
                                <div className="bg-yellow-500 px-4 py-2 rounded-lg shadow-lg">
                                    Best: {highScore}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="text-center mb-6">
                        <div className={`inline-block ${currentPrince.color} w-32 h-32 rounded-full shadow-xl border-4 border-white relative`}>
                            <div className="absolute inset-0 flex items-center justify-center text-6xl">
                                {currentPrince.image}
                            </div>
                        </div>
                        <h3 className="text-2xl font-bold text-white mt-2 drop-shadow-lg">
                            {currentPrince.name}
                        </h3>
                    </div>

                    <div className="bg-white rounded-3xl p-6 mb-6 shadow-2xl border-4 border-yellow-400">
                        {isCountingMode ? (
                            <>
                                <h4 className="text-2xl font-bold text-center mb-4 text-purple-800">
                                    Count the {currentPrince.objectName}!
                                </h4>
                                <div className="flex justify-center gap-2 mb-6 flex-wrap">
                                    {renderThemedObjects()}
                                </div>
                                <p className="text-center text-lg text-purple-600 font-semibold">
                                    Count and click the number or press it on your keyboard!
                                </p>
                            </>
                        ) : (
                            <>
                                <h4 className="text-2xl font-bold text-center mb-4 text-purple-800">
                                    Find the number: <span className="text-4xl text-red-500">{currentNumber}</span>
                                </h4>
                                <div className="flex justify-center gap-2 mb-6 flex-wrap">
                                    {renderThemedObjects()}
                                </div>
                                <p className="text-center text-lg text-purple-600 font-semibold">
                                    Click the number or press it on your keyboard!
                                </p>
                            </>
                        )}
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-6 max-w-md mx-auto">
                        {options.map((option) => (
                            <button
                                key={option}
                                onClick={() => handleAnswer(option)}
                                disabled={gameState !== 'playing'}
                                className={`
                                    w-full h-20 text-4xl font-bold rounded-2xl shadow-xl border-4 transition-all duration-200
                                    ${gameState === 'playing' ? 'hover:scale-105 active:scale-95' : ''}
                                    ${gameState === 'correct' && option === currentNumber ? 'bg-green-400 border-green-600' : 
                                      gameState === 'wrong' && option === currentNumber ? 'bg-green-400 border-green-600' :
                                      gameState === 'wrong' ? 'bg-gray-300 border-gray-400' :
                                      'bg-yellow-400 border-yellow-600 hover:bg-yellow-300'
                                    }
                                    text-white drop-shadow-lg
                                `}
                            >
                                {option}
                            </button>
                        ))}
                    </div>

                    {invalidKeyMessage && (
                        <div className="text-center mb-4">
                            <div className="bg-orange-400 text-white px-4 py-2 rounded-full text-lg font-semibold shadow-lg inline-block animate-pulse">
                                {invalidKeyMessage}
                            </div>
                        </div>
                    )}

                    {gameState === 'correct' && (
                        <div className="text-center">
                            <div className="bg-green-500 text-white px-6 py-3 rounded-full text-xl font-bold shadow-lg mb-4 animate-bounce">
                                ⭐ Perfect! ⭐
                            </div>
                        </div>
                    )}

                    {gameState === 'wrong' && (
                        <div className="text-center">
                            <div className="bg-orange-500 text-white px-6 py-3 rounded-full text-xl font-bold shadow-lg mb-4">
                                Try again! You can do it! 💪
                            </div>
                        </div>
                    )}

                    {showCelebration && (
                        <div className="fixed inset-0 pointer-events-none">
                            <div className="absolute inset-0 flex items-center justify-center">
                                <div className="text-6xl animate-ping">🎉</div>
                            </div>
                            <div className="absolute top-1/4 left-1/4 text-4xl animate-bounce">⭐</div>
                            <div className="absolute top-1/3 right-1/4 text-4xl animate-bounce" style={{ animationDelay: '0.2s' }}>🏆</div>
                            <div className="absolute bottom-1/3 left-1/3 text-4xl animate-bounce" style={{ animationDelay: '0.4s' }}>👑</div>
                            <div className="absolute bottom-1/4 right-1/3 text-4xl animate-bounce" style={{ animationDelay: '0.6s' }}>💎</div>
                        </div>
                    )}

                    <div className="text-center mt-8">
                        <button
                            onClick={() => {
                                const questionPrompts = isCountingMode ? [
                                    `Count my ${currentPrince.objectName} and find that number!`,
                                    `How many ${currentPrince.objectName} do you see?`,
                                    `Count and press the right number!`
                                ] : [
                                    `Find the number ${currentNumber}!`,
                                    `Can you spot ${currentNumber}?`,
                                    `Press the number ${currentNumber} on your keyboard!`
                                ];
                                const randomPrompt = questionPrompts[Math.floor(Math.random() * questionPrompts.length)];
                                speak(randomPrompt, 0.9);
                            }}
                            className="bg-purple-500 hover:bg-purple-600 text-white px-6 py-3 rounded-full font-bold shadow-lg transition-colors"
                        >
                            🔊 Repeat Question
                        </button>
                    </div>
                </div>
            );
        };

        const LettersGame = ({ setUnlockedBadges, setNewBadge }) => {
            const [gameMode, setGameMode] = useState('select-princess'); // 'select-princess', 'letters', 'spelling'
            const [selectedPrincess, setSelectedPrincess] = useState(null);
            const [level, setLevel] = useState(1);
            const [currentLetter, setCurrentLetter] = useState('A');
            const [score, setScore] = useState(0);
            const [gameState, setGameState] = useState('playing');
            const [startTime, setStartTime] = useState(Date.now());
            const [averageResponseTime, setAverageResponseTime] = useState(5000);
            const [responseCount, setResponseCount] = useState(0);
            const [showCelebration, setShowCelebration] = useState(false);
            const [invalidKeyMessage, setInvalidKeyMessage] = useState('');

            // Spelling game states
            const [currentWord, setCurrentWord] = useState('');
            const [userInput, setUserInput] = useState('');
            const [spellingScore, setSpellingScore] = useState(0);
            const [usedWords, setUsedWords] = useState([]);

            // Progress tracking
            const [princessProgress, setPrincessProgress] = useState({});
            const [isLoading, setIsLoading] = useState(true);

            // Load saved progress on mount
            useEffect(() => {
                const loadSavedProgress = async () => {
                    const saved = await loadProgress('letters');
                    if (saved) {
                        setPrincessProgress(saved.princessProgress || {});
                        // Always start at princess selection screen
                        // Don't auto-load last princess
                    }
                    setIsLoading(false);
                };
                loadSavedProgress();
            }, []);

            // Save progress whenever important state changes
            useEffect(() => {
                if (!isLoading && selectedPrincess) {
                    const updatedProgress = {
                        ...princessProgress,
                        [selectedPrincess.name]: {
                            level,
                            letterScore: score,
                            spellingScore,
                            highScore: Math.max(
                                score, 
                                princessProgress[selectedPrincess.name]?.highScore || 0
                            ),
                            spellingHighScore: Math.max(
                                spellingScore,
                                princessProgress[selectedPrincess.name]?.spellingHighScore || 0
                            )
                        }
                    };
                    setPrincessProgress(updatedProgress);
                    
                    saveProgress('letters', {
                        princessProgress: updatedProgress,
                        lastPrincess: selectedPrincess.name,
                        lastGameMode: gameMode
                    });
                }
            }, [score, level, spellingScore, gameMode, selectedPrincess, isLoading]);

            const princesses = [
                {
                    name: 'Princess Ariel',
                    color: 'bg-teal-500',
                    object: '🐚',
                    objectName: 'seashells',
                    image: '🧜',
                    encouragements: ["Wonderful!", "Perfect!", "Amazing!", "Fantastic!"],
                    keyboardRegion: 'Left Side (Q-T, A-G, Z-B)',
                    letters: ['Q', 'W', 'E', 'R', 'T', 'A', 'S', 'D', 'F', 'G', 'Z', 'X', 'C', 'V', 'B'],
                    words: ['CAT', 'BAT', 'RAT', 'SAT', 'FAT', 'BAD', 'DAD', 'SAD', 'RAG', 'BAG', 'TAG', 'WAG', 'BED', 'RED', 'WEB']
                },
                {
                    name: 'Princess Belle',
                    color: 'bg-yellow-500',
                    object: '📚',
                    objectName: 'books',
                    image: '👩',
                    encouragements: ["Excellent!", "Beautiful!", "Brilliant!", "Marvelous!"],
                    keyboardRegion: 'Right Side (Y-P, H-L, N-M)',
                    letters: ['Y', 'U', 'I', 'O', 'P', 'H', 'J', 'K', 'L', 'N', 'M'],
                    words: ['HIM', 'JOY', 'MOP', 'HOP', 'POP', 'MOM', 'PIN', 'WIN', 'KIN', 'INK', 'MILK', 'JUMP', 'PLUM', 'LIMP']
                },
                {
                    name: 'Princess Cinderella',
                    color: 'bg-blue-400',
                    object: '✨',
                    objectName: 'sparkles',
                    image: '👑',
                    encouragements: ["Magical!", "Enchanting!", "Wonderful!", "Perfect!"],
                    keyboardRegion: 'Top Row (Q-P)',
                    letters: ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
                    words: ['TOP', 'TIP', 'PET', 'WET', 'YET', 'TOY', 'ROT', 'POT', 'PIE', 'TIE', 'WIT', 'WIPE', 'TYPE', 'QUIT']
                },
                {
                    name: 'Princess Jasmine',
                    color: 'bg-purple-500',
                    object: '🧞‍♀️',
                    objectName: 'genies',
                    image: '🕌',
                    encouragements: ["Amazing!", "Incredible!", "Fantastic!", "Brilliant!"],
                    keyboardRegion: 'All Letters',
                    letters: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),
                    words: ['MAGIC', 'LAMP', 'WISH', 'STAR', 'MOON', 'DREAM', 'GENIE', 'TIGER', 'PALACE', 'FLYING', 'CARPET', 'JEWEL', 'PRINCE', 'DESERT']
                },
                {
                    name: 'Princess Elsa',
                    color: 'bg-cyan-400',
                    object: '❄️',
                    objectName: 'snowflakes',
                    image: '👸',
                    encouragements: ["Let it go!", "Magical!", "Frozen fantastic!", "Snow perfect!"],
                    keyboardRegion: 'Spelling Practice',
                    isSpellingOnly: true,
                    letters: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),
                    words: [
                        // 2-3 letter words
                        'GO', 'IN', 'UP', 'IT', 'ME', 'WE', 'BE', 'TO', 'DO', 'SO',
                        'CAT', 'DOG', 'SUN', 'FUN', 'RUN', 'HOT', 'BIG', 'TOP', 'HAT', 'BAT',
                        // 4 letter words
                        'SNOW', 'COLD', 'BLUE', 'LOVE', 'SING', 'PLAY', 'JUMP', 'FISH', 'BIRD', 'TREE',
                        // 5 letter words
                        'MAGIC', 'HAPPY', 'SMILE', 'DANCE', 'QUEEN', 'CROWN', 'DRESS', 'PARTY', 'CASTLE', 'FRIEND',
                        // Frozen-themed words
                        'ICE', 'FROZEN', 'WINTER', 'SISTER', 'ANNA', 'OLAF', 'WARM', 'HUG', 'BRAVE', 'POWER'
                    ]
                }
            ];

            const currentPrincess = selectedPrincess || princesses[0];

            // Handle keyboard for letter game
            useEffect(() => {
                if (gameMode !== 'letters' || gameState !== 'playing') return;

                const handleKeyPress = (event) => {
                    const key = event.key.toUpperCase();
                    
                    if (currentPrincess.letters.includes(key)) {
                        if (options.includes(key)) {
                            handleAnswer(key);
                        } else {
                            setInvalidKeyMessage(`${key} is not one of the options. Try ${options.join(', ')}`);
                            speak(`${key} is not an option. Look for ${currentLetter}`, 0.9);
                            setTimeout(() => setInvalidKeyMessage(''), 3000);
                        }
                    } else if (/^[A-Z]$/.test(key)) {
                        setInvalidKeyMessage(`${key} is not in ${currentPrincess.name}'s letters`);
                        speak(`${key} is not in ${currentPrincess.name}'s keyboard region`, 0.9);
                        setTimeout(() => setInvalidKeyMessage(''), 3000);
                    }
                };

                window.addEventListener('keypress', handleKeyPress);
                return () => window.removeEventListener('keypress', handleKeyPress);
            }, [gameMode, gameState, currentLetter]);

            // Handle keyboard for spelling game
            useEffect(() => {
                if (gameMode !== 'spelling') return;

                const handleKeyPress = (event) => {
                    const key = event.key.toUpperCase();
                    
                    if (event.key === 'Backspace') {
                        setUserInput(prev => prev.slice(0, -1));
                    } else if (/^[A-Z]$/.test(key) && userInput.length < currentWord.length) {
                        const newInput = userInput + key;
                        setUserInput(newInput);
                        
                        // Auto-check when word is complete
                        if (newInput.length === currentWord.length) {
                            setTimeout(() => checkSpelling(newInput), 500); // Small delay for user to see the last letter
                        }
                    }
                };

                const handleKeyDown = (event) => {
                    if (event.key === 'Backspace') {
                        event.preventDefault();
                        setUserInput(prev => prev.slice(0, -1));
                    }
                };

                window.addEventListener('keypress', handleKeyPress);
                window.addEventListener('keydown', handleKeyDown);
                return () => {
                    window.removeEventListener('keypress', handleKeyPress);
                    window.removeEventListener('keydown', handleKeyDown);
                };
            }, [gameMode, userInput, currentWord]);

            const getAvailableLetters = () => {
                if (!selectedPrincess) return [];
                const maxLetters = Math.min(level * 3, selectedPrincess.letters.length);
                return selectedPrincess.letters.slice(0, maxLetters);
            };

            const generateOptions = () => {
                const availableLetters = getAvailableLetters();
                const correctAnswer = currentLetter;
                const options = [correctAnswer];
                
                while (options.length < Math.min(4, availableLetters.length)) {
                    const randomLetter = availableLetters[Math.floor(Math.random() * availableLetters.length)];
                    if (!options.includes(randomLetter)) {
                        options.push(randomLetter);
                    }
                }
                
                return options.sort(() => Math.random() - 0.5);
            };

            const [options, setOptions] = useState([]);

            useEffect(() => {
                if (gameMode === 'letters' && selectedPrincess) {
                    setOptions(generateOptions());
                }
            }, [gameMode, selectedPrincess, currentLetter]);

            const speak = (text, rate = 1) => {
                if (isMuted) return;
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = rate;
                    utterance.pitch = 1.3;
                    utterance.volume = 0.8;
                    utterance.voice = getBestVoice('female', currentPrincess?.name);
                    speechSynthesis.speak(utterance);
                }
            };

            const selectPrincess = (princess) => {
                setSelectedPrincess(princess);
                const progress = princessProgress[princess.name] || {};

                if (princess.isSpellingOnly) {
                    setGameMode('spelling');
                    setSpellingScore(progress.spellingScore || 0);
                    setUsedWords([]); // Reset used words when selecting new princess
                    setUserInput(''); // Clear any previous input

                    // Use setTimeout to ensure state is updated before generating word
                    setTimeout(() => {
                        generateSpellingWord(princess);
                        speak(`Hi! I'm ${princess.name}. Let's practice spelling magical words together!`, 1);
                    }, 100);
                } else {
                    setGameMode('letters');
                    setLevel(progress.level || 1);
                    setScore(progress.letterScore || 0);
                    speak(`Hi! I'm ${princess.name}. Let's learn my letters together!`, 1);
                    generateNewQuestion(princess);
                }
            };

            const generateNewQuestion = (princess = currentPrincess) => {
                const availableLetters = princess.letters.slice(0, Math.min(level * 3, princess.letters.length));
                let newLetter;

                do {
                    newLetter = availableLetters[Math.floor(Math.random() * availableLetters.length)];
                } while (newLetter === currentLetter && availableLetters.length > 1);

                setCurrentLetter(newLetter);
                setStartTime(Date.now());
                setInvalidKeyMessage('');

                const correctAnswer = newLetter;
                const newOptions = [correctAnswer];

                while (newOptions.length < Math.min(4, availableLetters.length)) {
                    const randomLetter = availableLetters[Math.floor(Math.random() * availableLetters.length)];
                    if (!newOptions.includes(randomLetter)) {
                        newOptions.push(randomLetter);
                    }
                }

                setOptions(newOptions.sort(() => Math.random() - 0.5));
                setGameState('playing');

                const questionPrompts = [
                    `Find the letter ${newLetter}!`,
                    `Can you spot the letter ${newLetter}?`,
                    `Where is the letter ${newLetter} hiding?`,
                    `Touch the letter ${newLetter}!`,
                    `Press the letter ${newLetter} on your keyboard!`
                ];

                const randomPrompt = questionPrompts[Math.floor(Math.random() * questionPrompts.length)];

                setTimeout(() => {
                    speak(randomPrompt, 0.9);
                }, 500);
            };

            const handleAnswer = async (selectedLetter) => {
                if (gameState !== 'playing') return;

                const responseTime = Date.now() - startTime;
                const newResponseCount = responseCount + 1;
                const newAverageResponseTime = ((averageResponseTime * responseCount) + responseTime) / newResponseCount;

                setResponseCount(newResponseCount);
                setAverageResponseTime(newAverageResponseTime);
                setInvalidKeyMessage('');

                if (selectedLetter === currentLetter) {
                    setGameState('correct');
                    const newScore = score + 1;
                    setScore(newScore);
                    setShowCelebration(true);

                    // Badge checking
                    const badges = await loadBadges();
                    let badgeToShow = null;

                    if (newScore === 1) badgeToShow = await checkAndUnlockBadge('letters_score_1', badges);
                    else if (newScore === 10) badgeToShow = await checkAndUnlockBadge('letters_score_10', badges);
                    else if (newScore === 25) badgeToShow = await checkAndUnlockBadge('letters_score_25', badges);

                    if (badgeToShow) {
                        setNewBadge(badgeToShow);
                        const updatedBadges = await loadBadges();
                        setUnlockedBadges(updatedBadges);
                    }

                    const randomEncouragement = currentPrincess.encouragements[Math.floor(Math.random() * currentPrincess.encouragements.length)];
                    speak(randomEncouragement, 1.1);

                    // Check for level up or unlock spelling mode
                    if (score > 0 && (score + 1) % 5 === 0) {
                        if (level < 6) {
                            const newLevel = level + 1;
                            setLevel(newLevel);
                            speak(`Level up! You're doing great!`, 1.2);

                            // Check level badges
                            if (newLevel === 3) badgeToShow = await checkAndUnlockBadge('level_3', badges);
                            else if (newLevel === 5) badgeToShow = await checkAndUnlockBadge('level_5', badges);

                            if (badgeToShow) {
                                setNewBadge(badgeToShow);
                                const updatedBadges = await loadBadges();
                                setUnlockedBadges(updatedBadges);
                            }
                        }
                        if (level >= 3 && selectedPrincess.name === 'Princess Jasmine') {
                            speak(`Amazing! You've unlocked the spelling challenge!`, 1.2);
                        }
                    }

                    setTimeout(() => {
                        setShowCelebration(false);
                        generateNewQuestion();
                    }, 2500);

                } else {
                    setGameState('wrong');

                    const tryAgainMessages = [
                        `Try again! Look for ${currentLetter}`,
                        `Oops! Can you find ${currentLetter}?`,
                        `Not quite! Where is ${currentLetter}?`
                    ];

                    const randomTryAgain = tryAgainMessages[Math.floor(Math.random() * tryAgainMessages.length)];
                    speak(randomTryAgain, 0.8);

                    setTimeout(() => {
                        setGameState('playing');
                    }, 2000);
                }
            };

            // Spelling game functions
            const startSpellingGame = () => {
                setGameMode('spelling');
                setUserInput('');
                setUsedWords([]); // Reset used words when starting spelling game

                // Use setTimeout to ensure state is updated
                setTimeout(() => {
                    generateSpellingWord();
                    speak("Welcome to the spelling challenge! Type the word you see!", 1);
                }, 100);
            };

            const generateSpellingWord = (princess = currentPrincess) => {
                const wordList = princess.words;
                let difficulty;

                // For Elsa, use progressive difficulty based on score
                if (princess.name === 'Princess Elsa') {
                    if (spellingScore < 5) {
                        // Start with 2-3 letter words
                        difficulty = wordList.filter(w => w.length <= 3);
                    } else if (spellingScore < 10) {
                        // Move to 4 letter words
                        difficulty = wordList.filter(w => w.length <= 4);
                    } else if (spellingScore < 15) {
                        // Move to 5 letter words
                        difficulty = wordList.filter(w => w.length <= 5);
                    } else {
                        // All words including themed ones
                        difficulty = wordList;
                    }
                } else {
                    // For other princesses, use original logic
                    const difficultyLevel = Math.min(Math.floor(spellingScore / 3) + 1, wordList.length);
                    difficulty = wordList.slice(0, difficultyLevel);
                }

                // Filter out already used words
                const availableWords = difficulty.filter(word => !usedWords.includes(word));

                // Variable to hold the word we'll speak (to avoid stale state issue)
                let wordToSpeak;

                // If all words have been used, reset the used words list (but keep current word to avoid immediate repeat)
                if (availableWords.length === 0) {
                    setUsedWords([currentWord]);
                    const resetAvailable = difficulty.filter(word => word !== currentWord);
                    if (resetAvailable.length === 0) {
                        // Edge case: only one word available at this difficulty
                        const newWord = difficulty[0];
                        setCurrentWord(newWord);
                        setUserInput('');
                        setTimeout(() => {
                            speak(`Spell the word: ${newWord}`, 0.9);
                            setTimeout(() => {
                                speak(newWord.split('').join(' '), 0.7);
                            }, 1500);
                        }, 500);
                        return;
                    }
                    const newWord = resetAvailable[Math.floor(Math.random() * resetAvailable.length)];
                    wordToSpeak = newWord;
                    setCurrentWord(newWord);
                    setUserInput('');
                } else {
                    const newWord = availableWords[Math.floor(Math.random() * availableWords.length)];
                    wordToSpeak = newWord;
                    setCurrentWord(newWord);
                    setUsedWords([...usedWords, newWord]);
                    setUserInput('');
                }

                setTimeout(() => {
                    // First say the word normally, then spell it out
                    speak(`Spell the word: ${wordToSpeak}`, 0.9);
                    setTimeout(() => {
                        speak(wordToSpeak.split('').join(' '), 0.7);
                    }, 1500);
                }, 500);
            };

            const checkSpelling = async (inputToCheck = userInput) => {
                if (inputToCheck === currentWord) {
                    const newSpellingScore = spellingScore + 1;
                    setSpellingScore(newSpellingScore);
                    setShowCelebration(true);
                    speak("Perfect spelling! Great job!", 1.1);

                    // Badge checking
                    const badges = await loadBadges();
                    let badgeToShow = null;

                    if (newSpellingScore === 1) badgeToShow = await checkAndUnlockBadge('spelling_score_1', badges);
                    else if (newSpellingScore === 10) badgeToShow = await checkAndUnlockBadge('spelling_score_10', badges);

                    if (badgeToShow) {
                        setNewBadge(badgeToShow);
                        const updatedBadges = await loadBadges();
                        setUnlockedBadges(updatedBadges);
                    }

                    setTimeout(() => {
                        setShowCelebration(false);
                        generateSpellingWord();
                    }, 2500);
                } else {
                    // Say the word normally first, then spell it out
                    speak(`Not quite. The word is ${currentWord}.`, 0.9);
                    setTimeout(() => {
                        speak(`That's ${currentWord.split('').join(' ')}. Try again!`, 0.7);
                    }, 1500);
                    setTimeout(() => {
                        setUserInput('');
                    }, 3500);
                }
            };

            // Princess selection screen
            if (gameMode === 'select-princess') {
                return (
                    <div className="bg-gradient-to-b from-pink-300 via-purple-300 to-blue-300 rounded-3xl p-6">
                        <div className="text-center mb-6">
                            <h2 className="text-3xl font-bold text-white drop-shadow-lg mb-4">Choose Your Princess!</h2>
                            <p className="text-white text-lg">Each princess teaches different letters from the keyboard</p>
                        </div>

                        <div className="grid grid-cols-2 gap-4 max-w-3xl mx-auto">
                            {princesses.slice(0, 4).map((princess) => {
                                const progress = princessProgress[princess.name] || {};
                                return (
                                    <button
                                        key={princess.name}
                                        onClick={() => selectPrincess(princess)}
                                        className={`${princess.color} p-6 rounded-2xl shadow-xl border-4 border-white hover:scale-105 transition-all relative`}
                                    >
                                        <div className="text-6xl mb-2">{princess.image}</div>
                                        <h3 className="text-xl font-bold text-white mb-2">{princess.name}</h3>
                                        <p className="text-white text-sm font-semibold">{princess.keyboardRegion}</p>
                                        {progress.level && (
                                            <div className="mt-2 text-white text-xs">
                                                Level {progress.level} | Best: {progress.highScore || 0}
                                            </div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                        
                        {/* Elsa gets special treatment as spelling-only princess */}
                        <div className="mt-6 max-w-3xl mx-auto">
                            {(() => {
                                const elsaProgress = princessProgress['Princess Elsa'] || {};
                                return (
                                    <button
                                        onClick={() => selectPrincess(princesses[4])}
                                        className="w-full bg-gradient-to-r from-cyan-400 to-blue-400 p-6 rounded-2xl shadow-xl border-4 border-white hover:scale-105 transition-all relative overflow-hidden"
                                    >
                                        <div className="absolute inset-0 bg-white opacity-20 animate-pulse"></div>
                                        <div className="relative">
                                            <div className="text-6xl mb-2">👸❄️</div>
                                            <h3 className="text-2xl font-bold text-white mb-2">Princess Elsa</h3>
                                            <p className="text-white text-lg font-semibold">✨ Spelling Practice Only ✨</p>
                                            <p className="text-white text-sm mt-2">Learn to spell simple words from 2 to 6 letters!</p>
                                            {elsaProgress.spellingHighScore > 0 && (
                                                <div className="mt-2 text-white text-sm">
                                                    Best Score: {elsaProgress.spellingHighScore}
                                                </div>
                                            )}
                                        </div>
                                    </button>
                                );
                            })()}
                        </div>
                        
                        <div className="mt-6 text-center">
                            <button
                                onClick={() => {
                                    if (confirm('This will reset all your progress. Are you sure?')) {
                                        clearProgress('letters');
                                        setPrincessProgress({});
                                        setLevel(1);
                                        setScore(0);
                                        setSpellingScore(0);
                                        speak("Progress reset! Let's start fresh!", 1);
                                    }
                                }}
                                className="bg-red-400 hover:bg-red-500 text-white px-4 py-2 rounded-lg shadow-lg transition-colors text-sm"
                            >
                                Reset All Progress
                            </button>
                        </div>
                    </div>
                );
            }

            // Spelling game screen
            if (gameMode === 'spelling') {
                return (
                    <div className="bg-gradient-to-b from-pink-300 via-purple-300 to-blue-300 rounded-3xl p-6">
                        <div className="text-center mb-6">
                            <div className="flex justify-center items-center gap-4 mb-4">
                                <Star className="w-8 h-8 text-yellow-500" />
                                <h2 className="text-3xl font-bold text-white drop-shadow-lg">Spelling Challenge</h2>
                                <Star className="w-8 h-8 text-yellow-500" />
                            </div>
                            
                            <div className="flex justify-center gap-6 text-white font-semibold">
                                <div className="bg-purple-500 px-4 py-2 rounded-lg shadow-lg">
                                    Score: {spellingScore}
                                </div>
                                {princessProgress[currentPrincess.name]?.spellingHighScore > 0 && (
                                    <div className="bg-yellow-500 px-4 py-2 rounded-lg shadow-lg">
                                        Best: {princessProgress[currentPrincess.name].spellingHighScore}
                                    </div>
                                )}
                                {!currentPrincess.isSpellingOnly && (
                                    <button
                                        onClick={() => setGameMode('letters')}
                                        className="bg-pink-500 hover:bg-pink-600 px-4 py-2 rounded-lg shadow-lg transition-colors"
                                    >
                                        Back to Letters
                                    </button>
                                )}
                                <button
                                    onClick={() => {
                                        setGameMode('select-princess');
                                        setSelectedPrincess(null);
                                        setSpellingScore(0);
                                    }}
                                    className="bg-blue-400 hover:bg-blue-500 px-4 py-2 rounded-lg shadow-lg transition-colors"
                                >
                                    Choose Different Princess
                                </button>
                            </div>
                        </div>

                        <div className="text-center mb-6">
                            <div className={`inline-block ${currentPrincess.color} w-32 h-32 rounded-full shadow-xl border-4 border-white relative`}>
                                <div className="absolute inset-0 flex items-center justify-center text-6xl">
                                    {currentPrincess.image}
                                </div>
                            </div>
                            <h3 className="text-2xl font-bold text-white mt-2 drop-shadow-lg">
                                {currentPrincess.name}
                            </h3>

                'K': { sound: 'kuh', word: 'kite' },

                'M': { sound: 'mmm', word: 'moon' },
                'N': { sound: 'nnn', word: 'nose' },

            };

            const letters = Object.keys(letterSounds);

            const speak = (text, rate = 1) => {
                if (isMuted) return;
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = rate;
                    utterance.pitch = 1.3;
                    utterance.volume = 0.8;
                    utterance.voice = getBestVoice();
                    speechSynthesis.speak(utterance);

            const generateOptions = (letter) => {
                const currentSound = letterSounds[letter].sound;
                const options = [{ letter: letter, sound: currentSound }];

                while (options.length < 4) {
                    const randomLetter = letters[Math.floor(Math.random() * letters.length)];
                    if (!options.find(opt => opt.letter === randomLetter)) {
                        options.push({ letter: randomLetter, sound: letterSounds[randomLetter].sound });
                    }
                }

                return options.sort(() => Math.random() - 0.5);

            const [options, setOptions] = useState(generateOptions(currentLetter));

                if (gameState !== 'playing') return;

                        const option = options.find(opt => opt.letter === key);
                        if (option) {
                            handleAnswer(key);

                window.addEventListener('keypress', handleKeyPress);
                return () => window.removeEventListener('keypress', handleKeyPress);

                do {
                    newLetter = letters[Math.floor(Math.random() * letters.length)];

                                    text-white drop-shadow-lg

        // Coding Game Component
        const CodingGame = ({ setUnlockedBadges, setNewBadge }) => {
            const [level, setLevel] = useState(1);
            const [currentChallenge, setCurrentChallenge] = useState(null);
            const [userSequence, setUserSequence] = useState([]);
            const [score, setScore] = useState(0);
