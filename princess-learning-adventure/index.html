            const speak = (text, rate = 1) => {
                if (isMuted) return;
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = rate;
                    utterance.pitch = 1.1;
                    utterance.volume = 0.8;
                    utterance.voice = getBestVoice();
                    speechSynthesis.speak(utterance);
                }
            };

            // Coding challenges organized by level
            const challenges = {
                1: { // Sequences
                    type: 'sequence',
                    instruction: 'Complete the pattern!',
                    patterns: [
                        { sequence: ['🔴', '🔵', '🔴', '🔵', '🔴'], answer: '🔵', options: ['🔴', '🔵', '🟢'] },
                        { sequence: ['🌟', '🌙', '🌟', '🌙'], answer: '🌟', options: ['🌟', '🌙', '☀️'] },
                        { sequence: ['🍎', '🍎', '🍌', '🍎', '🍎'], answer: '🍌', options: ['🍎', '🍌', '🍇'] },
                        { sequence: ['⭐', '⭐', '⭐', '💫', '⭐', '⭐', '⭐'], answer: '💫', options: ['⭐', '💫', '✨'] }
                    ]
                },
                2: { // Simple directions
                    type: 'directions',
                    instruction: 'Help the character reach the goal!',
                    challenges: [
                        { grid: 3, start: [0, 0], goal: [2, 0], correctPath: ['→', '→'], obstacles: [] },
                        { grid: 3, start: [0, 0], goal: [0, 2], correctPath: ['↓', '↓'], obstacles: [] },
                        { grid: 3, start: [0, 0], goal: [2, 2], correctPath: ['→', '→', '↓', '↓'], obstacles: [] }
                    ]
                },
                3: { // Loops concept
                    type: 'loops',
                    instruction: 'Use REPEAT to make the pattern!',
                    patterns: [
                        { target: ['👏', '👏', '👏'], solution: { action: '👏', repeat: 3 }, options: [1, 2, 3, 4] },
                        { target: ['⭐', '⭐', '⭐', '⭐'], solution: { action: '⭐', repeat: 4 }, options: [2, 3, 4, 5] }
                    ]
                }
            };

            useEffect(() => {
                if (gameState === 'playing' && !currentChallenge) {
                    loadNewChallenge();
                }
            }, [gameState]);

            const loadNewChallenge = () => {
                const levelChallenges = challenges[level];
                if (levelChallenges.type === 'sequence') {
                    const pattern = levelChallenges.patterns[Math.floor(Math.random() * levelChallenges.patterns.length)];
                    setCurrentChallenge({ ...pattern, type: 'sequence' });
                } else if (levelChallenges.type === 'directions') {
                    const challenge = levelChallenges.challenges[Math.floor(Math.random() * levelChallenges.challenges.length)];
                    setCurrentChallenge({ ...challenge, type: 'directions' });
                } else if (levelChallenges.type === 'loops') {
                    const pattern = levelChallenges.patterns[Math.floor(Math.random() * levelChallenges.patterns.length)];
                    setCurrentChallenge({ ...pattern, type: 'loops' });
                }
                setUserSequence([]);
                setFeedback('');
            };

            const checkAnswer = (answer) => {
                if (!currentChallenge) return;

                if (currentChallenge.type === 'sequence') {
                    if (answer === currentChallenge.answer) {
                        handleCorrect();
                    } else {
                        handleIncorrect();
                    }
                } else if (currentChallenge.type === 'loops') {
                    if (answer === currentChallenge.solution.repeat) {
                        handleCorrect();
                    } else {
                        handleIncorrect();
                    }
                }
            };

            const handleCorrect = async () => {
                const newScore = score + 10;
                setScore(newScore);
                setFeedback('Amazing! You solved it! 🎉');
                speak('Great job! You got it right!', 1.0);

                // Save session data with KPIs
                await saveSessionData('coding', {
                    level,

                if (values.length === 0) return 0;

                // For metrics where lower is better (like response time, moves)

                if (Math.abs(diff) < (olderAvg * 0.1)) return 'stable'; // Less than 10% change
                return diff < 0 ? 'improving' : 'declining';

        // Tracing Game Component
        const TracingGame = ({ setUnlockedBadges, setNewBadge }) => {
            const [currentLetter, setCurrentLetter] = useState('A');
            const [traced, setTraced] = useState(0);
            const [totalTraced, setTotalTraced] = useState(0);
            const [isDrawing, setIsDrawing] = useState(false);
            const [canvasRef] = useState(React.createRef());
            const [guideCanvasRef] = useState(React.createRef());
            const [feedbackMessage, setFeedbackMessage] = useState('');

            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

            useEffect(() => {
                const loadTracingProgress = async () => {
                    const saved = await loadProgress('tracing');
                    if (saved) {
                        setTotalTraced(saved.traced || 0);
                    }
                };
                loadTracingProgress();
            }, []);

            const speak = (text, rate = 1) => {
                if (isMuted) return;
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = rate;
                    utterance.pitch = 1.3;
                    utterance.volume = 0.8;
                    utterance.voice = getBestVoice('female', 'Princess Rapunzel');
                    speechSynthesis.speak(utterance);
                }
            };

            const evaluateTracing = () => {
                const userCanvas = canvasRef.current;
                const guideCanvas = guideCanvasRef.current;

                if (!userCanvas || !guideCanvas) return 0;

                const userCtx = userCanvas.getContext('2d');
                const guideCtx = guideCanvas.getContext('2d');

                const userImageData = userCtx.getImageData(0, 0, userCanvas.width, userCanvas.height);
                const guideImageData = guideCtx.getImageData(0, 0, guideCanvas.width, guideCanvas.height);

                const userPixels = userImageData.data;
                const guidePixels = guideImageData.data;

                let userDrawnPixels = 0;
                let goodPixels = 0;

                // Check each pixel
                for (let i = 0; i < userPixels.length; i += 4) {
                    const userAlpha = userPixels[i + 3];
                    const guideAlpha = guidePixels[i + 3];

                    // If user drew something here
                    if (userAlpha > 50) {
                        userDrawnPixels++;
                        // Check if it overlaps with the guide letter
                        if (guideAlpha > 50) {
                            goodPixels++;
                        }
                    }
                }

                // Calculate accuracy percentage
                if (userDrawnPixels === 0) return 0;
                return (goodPixels / userDrawnPixels) * 100;
            };

            const handleComplete = async () => {
                const accuracy = evaluateTracing();

                // Check if user drew anything
                if (accuracy === 0) {
                    setFeedbackMessage(`Please trace the letter first! ✏️`);
                    speak(`Try tracing the letter ${currentLetter}!`, 0.9);

                    setTimeout(() => {
                        setFeedbackMessage('');
                    }, 3000);
                    return;
                }

                // Require at least 40% accuracy (lenient for young children)
                const requiredAccuracy = 40;

                if (accuracy < requiredAccuracy) {
                    setFeedbackMessage(`Try to stay inside the letter! You can do it! 💪`);
                    speak(`Try to trace closer to the letter ${currentLetter}. You can do it!`, 0.9);

                    setTimeout(() => {
                        setFeedbackMessage('');
                    }, 4000);
                    return;
                }

                // Success!
                setFeedbackMessage('');
                const newTraced = traced + 1;
                setTraced(newTraced);

                const newTotal = totalTraced + 1;
                setTotalTraced(newTotal);

                await saveProgress('tracing', { traced: newTotal });

                // Save session data with KPIs
                await saveSessionData('tracing', {
                    letter: currentLetter,
                    accuracy: Math.round(accuracy),
                    passedOnFirstTry: true
                });

                if (accuracy > 70) {
                    speak('Excellent tracing!', 1.1);
                } else {
                    speak('Good job!', 1.1);
                }

                // Check for badges
                if (newTotal === 10) {
                    const badges = await loadBadges();
                    const badge = await checkAndUnlockBadge('traced_10', badges);
                    if (badge) {
                        setNewBadge(badge);
                        const updated = await loadBadges();
                        setUnlockedBadges(updated);
                    }
                }

                // Move to next letter after a short delay
                setTimeout(() => {
                    handleNextLetter();
                }, 1500);
            };

            const handleNextLetter = () => {
                const currentIndex = letters.indexOf(currentLetter);
                const nextIndex = (currentIndex + 1) % letters.length;
                setCurrentLetter(letters[nextIndex]);
                setFeedbackMessage('');

                // Clear canvas
                const canvas = canvasRef.current;
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }

                speak(`Let's trace the letter ${letters[nextIndex]}`, 0.9);
            };

            const handleClear = () => {
                const canvas = canvasRef.current;
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
                setFeedbackMessage('');
            };

            const startDrawing = (e) => {
                setIsDrawing(true);
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
                const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
                const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#8b5cf6';
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.stroke();
            };

            const stopDrawing = () => {
                setIsDrawing(false);
            };

            // Draw guide letter on hidden canvas
            useEffect(() => {
                const guideCanvas = guideCanvasRef.current;
                if (guideCanvas) {
                    const ctx = guideCanvas.getContext('2d');
                    ctx.clearRect(0, 0, guideCanvas.width, guideCanvas.height);

                    // Draw the letter filled
                    ctx.font = 'bold 300px Arial';
                    ctx.fillStyle = 'black';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(currentLetter, guideCanvas.width / 2, guideCanvas.height / 2);

                if (newFlipped.length === 2) {
                    setMoves(moves + 1);

                            const newBestMoves = bestMoves === 0 ? finalMoves : Math.min(bestMoves, finalMoves);

                    <circle cx="150" cy="30" r="5" fill={fills.jewel} />
                    <circle cx="126" cy="38" r="3.5" fill={fills.jewel} />
                    <circle cx="174" cy="38" r="3.5" fill={fills.jewel} />
                    <rect x="116" y="58" width="68" height="7" rx="3" fill={fills.main} />
                </g>
            );
        };

        const DuWand = ({ style, fills }) => (
            <g>
                <line x1="197" y1="262" x2="224" y2="196" stroke="#d4a373" strokeWidth="6" strokeLinecap="round" />
                {style === 'heartwand' ? (
                    <path d="M226,184 C222,176 210,176 210,185 C210,193 226,202 226,202 C226,202 242,193 242,185 C242,176 230,176 226,184 Z" fill={fills.main} />
                ) : (
                    <path d="M226,170 L231,182 L244,183 L234,192 L237,205 L226,198 L215,205 L218,192 L208,183 L221,182 Z" fill={fills.main} />
                )}
                <text x="238" y="176" fontSize="14">✨</text>
            </g>
        );

        const DressUpItemLayer = ({ item }) => {
            switch (item.category) {
                case 'dress': return <DuDress style={item.style} fills={item.fills} />;
                case 'crown': return <DuCrown style={item.style} fills={item.fills} />;
                case 'shoes': return <DuShoes style={item.style} fills={item.fills} />;
                case 'necklace': return <DuNecklace style={item.style} fills={item.fills} />;
                case 'wand': return <DuWand style={item.style} fills={item.fills} />;
                default: return null;
            }
        };

        // Cropped viewBox per category so tray previews zoom in on the item
        const DRESSUP_PREVIEW_BOX = {
            dress: '55 140 190 310',
            crown: '100 20 100 55',
            shoes: '105 390 90 85',
            necklace: '125 145 50 50',
            wand: '190 150 70 125'
        };

        const WardrobeItemPreview = ({ item }) => (
            <svg viewBox={DRESSUP_PREVIEW_BOX[item.category]} className="w-full h-14">
                <DressUpItemLayer item={item} />
            </svg>
        );

        const PrincessDoll = ({ princess, outfit, dollRef, dragOver }) => {
            const equipped = (cat) => WARDROBE.find(i => i.id === outfit[cat]) || null;
            const dress = equipped('dress');
            const crown = equipped('crown');
            const shoes = equipped('shoes');
            const necklace = equipped('necklace');
            const wand = equipped('wand');
            return (
                <div ref={dollRef} className={`bg-white bg-opacity-60 rounded-3xl p-2 transition-all ${dragOver ? 'ring-4 ring-yellow-300 scale-105' : ''}`}>
                    <svg viewBox="0 0 300 500" className="w-56 md:w-72 h-auto">
                        <DuHairBack hair={princess.hair} />
                        <DuBody skin={princess.skin} />
                        {shoes && <DressUpItemLayer item={shoes} />}
                        {dress && <DressUpItemLayer item={dress} />}
                        {necklace && <DressUpItemLayer item={necklace} />}
                        <DuHead skin={princess.skin} hair={princess.hair} />
                        {crown && <DressUpItemLayer item={crown} />}
                        {wand && <DressUpItemLayer item={wand} />}
                    </svg>
                </div>
            );
        };

        // Mini face portrait for the select screen — each princess's real skin/hair colors
        const PrincessPortrait = ({ princess }) => (
            <svg viewBox="95 30 110 115" className="w-20 h-20 mx-auto mb-2">
                <DuHairBack hair={princess.hair} />
                <DuHead skin={princess.skin} hair={princess.hair} />
            </svg>
        );

        const DRESSUP_EMPTY_OUTFIT = { dress: null, crown: null, shoes: null, necklace: null, wand: null };

        const DressUpGame = ({ setUnlockedBadges, setNewBadge }) => {
            const [gameMode, setGameMode] = useState('select-princess');
            const [selectedPrincess, setSelectedPrincess] = useState(null);
            const [outfit, setOutfit] = useState(DRESSUP_EMPTY_OUTFIT);
            const [savedOutfits, setSavedOutfits] = useState({});
            const [showCelebration, setShowCelebration] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [openCategory, setOpenCategory] = useState('dress');
            const [dragItem, setDragItem] = useState(null);
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [dragOver, setDragOver] = useState(false);
            const dollRef = useRef(null);
            const movedRef = useRef(false);
            const dragStartRef = useRef({ x: 0, y: 0 });
            const savedOutfitsRef = useRef({});
            const badgeDoneRef = useRef(false);

            const speak = (text, rate = 1) => {
                if (isMuted) return;
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = rate;
                    utterance.pitch = 1.2;
                    utterance.volume = 0.8;
                    utterance.voice = getBestVoice('female', selectedPrincess?.name);
                    speechSynthesis.speak(utterance);
                }
            };

            useEffect(() => {
                const loadSaved = async () => {
                    const saved = await loadProgress('dressup');
                    if (saved?.outfits) {
                        savedOutfitsRef.current = saved.outfits;
                        setSavedOutfits(saved.outfits);
                    }
                    setIsLoading(false);
                };
                loadSaved();
                speak('Welcome to the royal dressing room! Choose a princess to dress up!', 0.95);
            }, []);

            // Auto-save the outfit for the current princess whenever it changes
            useEffect(() => {
                if (gameMode !== 'play' || !selectedPrincess || isLoading) return;
                const next = { ...savedOutfitsRef.current, [selectedPrincess.id]: outfit };
                savedOutfitsRef.current = next;
                setSavedOutfits(next);
                saveProgress('dressup', { outfits: next, lastPrincess: selectedPrincess.id, lastPlayed: new Date().toISOString() });
            }, [outfit]);

            const selectPrincess = (princess) => {
                setSelectedPrincess(princess);
                setOutfit(savedOutfitsRef.current[princess.id] || DRESSUP_EMPTY_OUTFIT);
                setOpenCategory('dress');
                setGameMode('play');
                speak(princess.intro, 0.95);
            };

            // Princesses that are dressed up (wearing at least a dress) join the parade
            const paradePrincesses = DRESSUP_PRINCESSES.filter(p => savedOutfits[p.id]?.dress);

            const startParade = () => {
                if (paradePrincesses.length === 0) {
                    speak('Dress up a princess first, then come watch the parade!', 0.95);
                    return;
                }
                setGameMode('parade');
                const names = paradePrincesses.map(p => p.name).join(', ');
                speak(`Welcome to the Princess Parade! Here come ${names}!`, 0.95);
            };

            // After equipping, collapse this category and open the next one (accordion flow)
            const nextCategoryId = (categoryId) => {
                const index = DRESSUP_CATEGORIES.findIndex(c => c.id === categoryId);
                return index >= 0 && index < DRESSUP_CATEGORIES.length - 1 ? DRESSUP_CATEGORIES[index + 1].id : null;
            };

            const equipItem = (item, viaDrag) => {
                const currentlyOn = outfit[item.category] === item.id;
                if (currentlyOn && !viaDrag) {
                    setOutfit({ ...outfit, [item.category]: null });
                    speak('Off it goes!', 1);
                } else if (!currentlyOn) {
                    setOutfit({ ...outfit, [item.category]: item.id });
                    setOpenCategory(nextCategoryId(item.category));
                    const phrases = [
                        `Ooh, ${item.spokenName}! Beautiful!`,
                        `${item.spokenName}! Lovely choice!`,
                        `Wow, ${item.spokenName}! So pretty!`
                    ];
                    speak(phrases[Math.floor(Math.random() * phrases.length)], 1);
                }
            };

            const handleItemClick = (item) => {
                if (movedRef.current) return; // ignore the synthetic click right after a drag
                equipItem(item, false);
            };

            const handlePointerDown = (e, item) => {
                dragStartRef.current = { x: e.clientX, y: e.clientY };
                movedRef.current = false;
                setDragItem(item);
                setDragPos({ x: e.clientX, y: e.clientY });
            };

            useEffect(() => {
                if (!dragItem) return;
                const isOverDoll = (x, y) => {
                    const rect = dollRef.current?.getBoundingClientRect();
                    return !!rect && x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
                };
                const onMove = (e) => {
                    if (Math.abs(e.clientX - dragStartRef.current.x) + Math.abs(e.clientY - dragStartRef.current.y) > 8) {
                        movedRef.current = true;
                    }
                    setDragPos({ x: e.clientX, y: e.clientY });
                    setDragOver(isOverDoll(e.clientX, e.clientY));
                };
                const onUp = (e) => {
                    if (movedRef.current && isOverDoll(e.clientX, e.clientY)) {
                        equipItem(dragItem, true);
                    }
                    setDragItem(null);
                    setDragOver(false);
                    // let the trailing click event fire (and be ignored) before clearing the guard
                    setTimeout(() => { movedRef.current = false; }, 0);
                };
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
                return () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                };
            }, [dragItem, outfit]);

            const surpriseMe = () => {
                const next = {};
                DRESSUP_CATEGORIES.forEach(cat => {
                    const items = WARDROBE.filter(i => i.category === cat.id);
                    next[cat.id] = items[Math.floor(Math.random() * items.length)].id;
                });
                setOutfit(next);
                speak('Surprise! What do you think?', 1);
            };

            const startOver = () => {
                setOutfit({ ...DRESSUP_EMPTY_OUTFIT });
                speak("Let's start fresh!", 1);
            };

            const handleTada = async () => {
                const compliment = DRESSUP_COMPLIMENTS[Math.floor(Math.random() * DRESSUP_COMPLIMENTS.length)];
                speak(`Ta-da! ${selectedPrincess.name}, ${compliment}`, 0.95);
                setShowCelebration(true);
                setTimeout(() => setShowCelebration(false), 4000);

                if (!badgeDoneRef.current) {
                    badgeDoneRef.current = true;
                    const badges = await loadBadges();
                    const badgeToShow = await checkAndUnlockBadge('dressup_first', badges);
                    if (badgeToShow) {
                        setNewBadge(badgeToShow);
                        const updatedBadges = await loadBadges();
                        setUnlockedBadges(updatedBadges);
                    }
                }
            };

            if (gameMode === 'select-princess') {
                return (
                    <div className="bg-gradient-to-b from-rose-300 via-fuchsia-300 to-pink-300 rounded-3xl p-6">
                        <div className="text-center mb-6">
                            <h2 className="text-3xl font-bold text-white drop-shadow-lg mb-4">👗 Royal Dressing Room 👗</h2>
                            <p className="text-white text-lg">Choose a princess to dress up!</p>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-3xl mx-auto">
                            {DRESSUP_PRINCESSES.map((princess) => {
                                const saved = savedOutfits[princess.id];
                                const hasSavedOutfit = saved && Object.values(saved).some(Boolean);
                                return (
                                    <button
                                        key={princess.id}
                                        onClick={() => selectPrincess(princess)}
                                        className={`${princess.color} p-6 rounded-2xl shadow-xl border-4 border-white hover:scale-105 transition-all`}
                                    >
                                        <PrincessPortrait princess={princess} />
                                        <h3 className="text-xl font-bold text-white">{princess.name}</h3>
                                        {hasSavedOutfit && (
                                            <div className="mt-2 text-white text-xs bg-white bg-opacity-30 rounded-full px-2 py-1 inline-block">💾 Saved outfit</div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>

                        <div className="mt-6 max-w-3xl mx-auto">
                            <button
                                onClick={startParade}
                                className={`w-full p-4 rounded-2xl shadow-xl border-4 border-white font-bold text-2xl text-white transition-all ${paradePrincesses.length > 0 ? 'bg-gradient-to-r from-amber-400 via-pink-500 to-purple-500 hover:scale-105 active:scale-95' : 'bg-gray-400 opacity-60'}`}
                            >
                                🎺 Princess Parade! 🎺
                                <div className="text-sm font-semibold opacity-90">
                                    {paradePrincesses.length > 0
                                        ? `Watch your ${paradePrincesses.length} dressed-up princess${paradePrincesses.length > 1 ? 'es' : ''} strut across the stage!`
                                        : 'Dress up a princess to start the parade!'}
                                </div>
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameMode === 'parade') {
                return (
                    <div className="bg-gradient-to-b from-rose-300 via-fuchsia-300 to-pink-300 rounded-3xl p-6">
                        <div className="flex items-center justify-between flex-wrap gap-3 mb-6">
                            <button
                                onClick={() => setGameMode('select-princess')}
                                className="bg-white bg-opacity-30 hover:bg-opacity-50 text-white px-4 py-2 rounded-full font-bold shadow-lg transition-all"
                            >
                                ← Back
                            </button>
                            <h2 className="text-2xl md:text-3xl font-bold text-white drop-shadow-lg">🎺 Princess Parade! 🎺</h2>
                        </div>

                        <div className="relative overflow-hidden h-96 rounded-2xl bg-gradient-to-b from-indigo-900 via-purple-700 to-fuchsia-500 shadow-2xl border-4 border-white">
                            {/* stage decorations */}
                            <div className="absolute top-4 left-8 text-3xl animate-pulse">✨</div>
                            <div className="absolute top-10 right-12 text-3xl animate-pulse" style={{ animationDelay: '0.5s' }}>🎊</div>
                            <div className="absolute top-6 left-1/2 text-3xl animate-pulse" style={{ animationDelay: '1s' }}>⭐</div>
                            <div className="absolute top-16 left-1/4 text-2xl animate-pulse" style={{ animationDelay: '1.5s' }}>✨</div>
                            {/* red carpet */}
                            <div className="absolute bottom-0 left-0 right-0 h-10 bg-gradient-to-b from-red-500 to-red-700"></div>

                            {paradePrincesses.map((princess, index) => (
                                <div
                                    key={princess.id}
                                    className="absolute bottom-4"
                                    style={{ left: '-20%', animation: 'parade-walk 14s linear infinite', animationDelay: `${index * 2.5}s` }}
                                >
                                    <div style={{ animation: 'parade-bob 0.7s ease-in-out infinite' }}>
                                        <svg viewBox="0 0 300 500" className="w-28 h-auto">
                                            <DuHairBack hair={princess.hair} />
                                            <DuBody skin={princess.skin} />
                                            {['shoes', 'dress', 'necklace'].map(cat => {
                                                const item = WARDROBE.find(i => i.id === savedOutfits[princess.id]?.[cat]);
                                                return item ? <DressUpItemLayer key={cat} item={item} /> : null;
                                            })}
                                            <DuHead skin={princess.skin} hair={princess.hair} />
                                            {['crown', 'wand'].map(cat => {
                                                const item = WARDROBE.find(i => i.id === savedOutfits[princess.id]?.[cat]);
                                                return item ? <DressUpItemLayer key={cat} item={item} /> : null;
                                            })}
                                        </svg>
                                    </div>
                                    <div className="text-center text-white font-bold text-sm drop-shadow-lg mt-1">{princess.name}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            const dressOn = !!outfit.dress;

            return (
                <div className="bg-gradient-to-b from-rose-300 via-fuchsia-300 to-pink-300 rounded-3xl p-6">
                    <div className="flex items-center justify-between flex-wrap gap-3 mb-6">
                        <button
                            onClick={() => { setGameMode('select-princess'); setSelectedPrincess(null); }}
                            className="bg-white bg-opacity-30 hover:bg-opacity-50 text-white px-4 py-2 rounded-full font-bold shadow-lg transition-all"
                        >
                            ← Choose Another Princess
                        </button>
                        <h2 className="text-2xl md:text-3xl font-bold text-white drop-shadow-lg">✨ Dress Up {selectedPrincess.name}! ✨</h2>
                    </div>

                    <div className="flex flex-col md:flex-row gap-6 items-center md:items-start justify-center">
                        {/* Doll */}
                        <div className="flex flex-col items-center gap-4">
                            <PrincessDoll princess={selectedPrincess} outfit={outfit} dollRef={dollRef} dragOver={dragOver} />
                            <div className="flex flex-wrap justify-center gap-2">
                                <button
                                    onClick={surpriseMe}
                                    className="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-full font-bold shadow-lg hover:scale-105 active:scale-95 transition-all"
                                >
                                    🎲 Surprise Me!
                                </button>
                                <button
                                    onClick={startOver}
                                    className="bg-blue-400 hover:bg-blue-500 text-white px-4 py-2 rounded-full font-bold shadow-lg hover:scale-105 active:scale-95 transition-all"
                                >
                                    🔄 Start Over
                                </button>
                                <button
                                    onClick={handleTada}
                                    disabled={!dressOn}
                                    className={`px-6 py-2 rounded-full font-bold shadow-lg transition-all ${dressOn ? 'bg-yellow-400 hover:bg-yellow-500 text-yellow-900 hover:scale-105 active:scale-95 animate-pulse' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                                >
                                    🌟 Ta-da!
                                </button>
                            </div>
                        </div>

                        {/* Wardrobe tray — accordion: one category open at a time */}
                        <div className="flex-1 max-w-xl w-full space-y-2">
                            {DRESSUP_CATEGORIES.map((cat) => {
                                const isOpen = openCategory === cat.id;
                                const equippedItem = WARDROBE.find(i => i.id === outfit[cat.id]);
                                return (
                                    <div key={cat.id} className="bg-white bg-opacity-70 rounded-2xl p-2">
                                        <button
                                            onClick={() => setOpenCategory(isOpen ? null : cat.id)}
                                            className="w-full flex items-center gap-2 px-2 py-1 rounded-xl hover:bg-white hover:bg-opacity-60 transition-all"
                                        >
                                            <span className="font-bold text-fuchsia-700 text-lg">{cat.emoji} {cat.name}</span>
                                            {!isOpen && equippedItem && (
                                                <span className="flex items-center gap-1 ml-auto bg-fuchsia-100 rounded-full px-2 py-0.5">
                                                    <svg viewBox={DRESSUP_PREVIEW_BOX[cat.id]} className="w-8 h-8">
                                                        <DressUpItemLayer item={equippedItem} />
                                                    </svg>
                                                    <span className="text-xs font-bold text-fuchsia-700">{equippedItem.name}</span>
                                                </span>
                                            )}
                                            <span className={`font-bold text-fuchsia-700 text-xl ${(!isOpen && equippedItem) ? '' : 'ml-auto'}`}>{isOpen ? '▾' : '▸'}</span>
                                        </button>
                                        {isOpen && (
                                            <div className="grid grid-cols-3 gap-2 mt-2">
                                                {WARDROBE.filter(i => i.category === cat.id).map((item) => {
                                                    const isEquipped = outfit[item.category] === item.id;
                                                    return (
                                                        <button
                                                            key={item.id}
                                                            onClick={() => handleItemClick(item)}
                                                            onPointerDown={(e) => handlePointerDown(e, item)}
                                                            className={`relative touch-none bg-white rounded-xl p-2 shadow-lg border-4 transition-all hover:scale-105 active:scale-95 ${isEquipped ? 'border-fuchsia-500 ring-4 ring-fuchsia-300' : 'border-transparent'}`}
                                                        >
                                                            <WardrobeItemPreview item={item} />
                                                            <div className="text-xs font-bold text-gray-600 mt-1 truncate">{item.name}</div>
                                                            {isEquipped && (
                                                                <div className="absolute -top-2 -right-2 bg-fuchsia-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm font-bold">✓</div>
                                                            )}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Drag ghost */}
                    {dragItem && movedRef.current && (
                        <div className="fixed pointer-events-none z-50" style={{ left: dragPos.x - 28, top: dragPos.y - 28, width: '56px', height: '56px' }}>
                            <WardrobeItemPreview item={dragItem} />
                        </div>
                    )}

                    {showCelebration && (
                        <div className="fixed inset-0 pointer-events-none z-50">
                            <div className="absolute inset-0 flex items-center justify-center">
                                <div className="text-6xl animate-ping">🎉</div>
                            </div>
                            <div className="absolute top-1/4 left-1/4 text-4xl animate-bounce">⭐</div>
                            <div className="absolute top-1/3 right-1/4 text-4xl animate-bounce" style={{ animationDelay: '0.2s' }}>👗</div>
                            <div className="absolute bottom-1/3 left-1/3 text-4xl animate-bounce" style={{ animationDelay: '0.4s' }}>👑</div>
                            <div className="absolute bottom-1/4 right-1/3 text-4xl animate-bounce" style={{ animationDelay: '0.6s' }}>💎</div>
                            <div className="absolute top-1/2 left-1/5 text-4xl animate-bounce" style={{ animationDelay: '0.3s' }}>✨</div>
                        </div>
                    )}
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<DisneyLearningGames />, document.getElementById('root'));
