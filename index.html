<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Games for Kids 🎮</title>
<style>
  :root{ --ink:#41355c; }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; font-family:'Comic Sans MS','Baloo 2','Trebuchet MS',system-ui,sans-serif;
    color:var(--ink); text-align:center;
    background:linear-gradient(180deg,#b3e5fc 0%, #e1f5fe 45%, #a5d6a7 100%);
    display:flex; flex-direction:column; align-items:center; padding:40px 18px 60px;}
  h1{font-size:clamp(34px,8vw,64px); margin:.2em 0; color:#fff;
     text-shadow:0 3px 0 #ff8fb1, 0 6px 0 #b388ff, 0 10px 18px rgba(0,0,0,.18);}
  .subtitle{font-size:clamp(16px,3.4vw,22px); color:#5d4a86; background:#ffffffcc;
     padding:8px 18px; border-radius:30px; box-shadow:0 8px 24px rgba(80,50,120,.18); margin-bottom:30px;}
  .grid{display:flex; flex-wrap:wrap; gap:22px; justify-content:center; max-width:900px;}
  .card{display:block; text-decoration:none; color:var(--ink); width:280px;
    background:#fffdf7; border-radius:28px; box-shadow:0 10px 0 rgba(0,0,0,.06), 0 18px 40px rgba(80,50,120,.18);
    overflow:hidden; transition:transform .15s ease;}
  .card:hover{transform:translateY(-6px) scale(1.02);}
  .thumb{height:160px; display:grid; place-items:center; font-size:84px;
    background:linear-gradient(180deg,#e1bee7,#b388ff);}
  .card h2{margin:14px 16px 4px; font-size:24px;}
  .card p{margin:0 16px 18px; font-size:15px; color:#6a5a93;}
  .soon{opacity:.7;}
  .soon .thumb{background:linear-gradient(180deg,#cfd8dc,#90a4ae); filter:grayscale(.3);}
  footer{margin-top:40px; font-size:13px; color:#5d4a86; opacity:.8;}
</style>
</head>
<body>
  <h1>Games for Kids 🎮</h1>
  <div class="subtitle">A little collection of fun, friendly games.</div>
  <div class="grid">
    <a class="card" href="butterfly-garden/">
      <div class="thumb">🦋</div>
      <h2>Butterfly Garden</h2>
      <p>Count, add, subtract, spell, and dress up real butterflies. Talks out loud. Ages ~4.</p>
    </a>
    <div class="card soon">
      <div class="thumb">✨</div>
      <h2>More coming soon</h2>
      <p>New games will land right here.</p>
    </div>
  </div>
  <footer>Made with ❤️. Open any game to play right in your browser.</footer>
</body>
</html>
